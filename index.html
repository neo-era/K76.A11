<!DOCTYPE html>
<html lang="vi">
<head>
    <title>K76.A11 — Bản đồ lớp</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="author" content="Mai Vũ Lâm">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --navy: #0f172a;
            --navy2: #1e293b;
            --sky: #0ea5e9;
            --sky-dark: #0284c7;
            --green: #10b981;
            --amber: #f59e0b;
            --red: #ef4444;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --bg: #f8fafc;
            --white: #ffffff;
            --radius: 12px;
            --shadow: 0 4px 20px rgba(0,0,0,0.12);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.18);
            --topbar-h: 56px;
            --bottomnav-h: 64px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --panel-w: 300px;
        }

        html, body {
            height: 100%; width: 100%;
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            background: var(--navy);
            color: var(--text);
        }

        /* ── TOP BAR ── */
        #topBar {
            position: fixed; top: 0; left: 0; right: 0;
            height: var(--topbar-h);
            background: rgba(15,23,42,0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; gap: 10px;
            padding: 0 12px;
            z-index: 3000;
        }
        .topbar-brand {
            font-size: 15px; font-weight: 700;
            background: linear-gradient(135deg, var(--sky), #818cf8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            flex-shrink: 0; white-space: nowrap;
        }
        .topbar-search {
            flex: 1; display: flex; align-items: center;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 999px; overflow: hidden;
            max-width: 500px;
        }
        .topbar-search input {
            flex: 1; border: none; background: transparent;
            color: #fff; font-size: 14px; padding: 0 14px;
            outline: none; height: 36px;
        }
        .topbar-search input::placeholder { color: rgba(255,255,255,0.4); }
        .topbar-search button {
            width: 36px; height: 36px; border: none; background: var(--sky);
            color: #fff; cursor: pointer; font-size: 15px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; border-radius: 0 999px 999px 0;
            transition: background 0.2s;
        }
        .topbar-search button:hover { background: var(--sky-dark); }
        #searchResultsDropdown {
            position: fixed; top: var(--topbar-h); left: 12px; right: 12px;
            max-width: 524px; background: var(--white);
            border-radius: var(--radius); box-shadow: var(--shadow-lg);
            max-height: 280px; overflow-y: auto;
            z-index: 3100; display: none;
        }
        #searchResultsDropdown ul { list-style: none; padding: 6px 0; }
        #searchResultsDropdown li a {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 16px; color: var(--text); text-decoration: none;
            font-size: 13px; transition: background 0.15s;
        }
        #searchResultsDropdown li a:hover { background: #f1f5f9; }

        /* ── LEFT PANEL ── */
        #leftPanel {
            position: fixed;
            top: var(--topbar-h); left: 0; bottom: 0;
            width: var(--panel-w);
            background: var(--white);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            z-index: 2000;
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 2px 0 12px rgba(0,0,0,0.08);
        }
        #leftPanel.hidden { transform: translateX(-100%); }
        .panel-header {
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
            color: #fff; padding: 14px 16px;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .panel-header-title { font-size: 14px; font-weight: 700; }
        .panel-header-count {
            background: rgba(14,165,233,0.3); color: #7dd3fc;
            border-radius: 999px; padding: 2px 8px; font-size: 12px;
        }
        .panel-search {
            padding: 10px 12px; flex-shrink: 0;
            border-bottom: 1px solid var(--border);
        }
        .panel-search input {
            width: 100%; padding: 8px 12px;
            border: 1.5px solid var(--border); border-radius: 8px;
            font-size: 13px; font-family: inherit; outline: none;
            transition: border-color 0.2s; background: var(--bg);
        }
        .panel-search input:focus { border-color: var(--sky); }
        .panel-list { flex: 1; overflow-y: auto; }
        .panel-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.15s;
        }
        .panel-item:hover { background: #f0f9ff; }
        .panel-item.active { background: #e0f2fe; }
        .panel-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            object-fit: cover; flex-shrink: 0;
            border: 2px solid var(--border);
            background: #f1f5f9;
        }
        .panel-avatar-placeholder {
            width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
            background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
        }
        .panel-item-info { min-width: 0; flex: 1; }
        .panel-item-name {
            font-size: 13px; font-weight: 600; color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .panel-item-sub {
            font-size: 11px; color: var(--text-muted);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-top: 2px;
        }
        .panel-item-badge {
            font-size: 10px; padding: 2px 6px; border-radius: 999px;
            background: #dbeafe; color: #1d4ed8; flex-shrink: 0;
        }
        .panel-no-coords { color: #f59e0b; font-size: 14px; flex-shrink: 0; }
        #panelLoading {
            padding: 20px; text-align: center; color: var(--text-muted); font-size: 13px;
        }

        /* Panel toggle button */
        #panelToggle {
            position: fixed;
            top: calc(var(--topbar-h) + 12px);
            left: calc(var(--panel-w) + 8px);
            z-index: 2100;
            background: var(--white); border: 1px solid var(--border);
            border-radius: 8px; width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 16px;
            box-shadow: var(--shadow);
            transition: left 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        #panelToggle.panel-hidden { left: 8px; }

        /* ── MAP ── */
        #map {
            position: fixed;
            top: var(--topbar-h);
            left: var(--panel-w);
            right: 0;
            bottom: 0;
            z-index: 1;
            transition: left 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        #map.panel-hidden { left: 0; }

        /* ── BOTTOM NAV (mobile only) ── */
        #bottomNav {
            display: none;
            position: fixed; bottom: 0; left: 0; right: 0;
            height: calc(var(--bottomnav-h) + var(--safe-bottom));
            padding-bottom: var(--safe-bottom);
            background: rgba(15,23,42,0.95);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255,255,255,0.08);
            align-items: center; justify-content: space-around;
            z-index: 3000;
        }
        .nav-btn {
            display: flex; flex-direction: column; align-items: center; gap: 3px;
            background: transparent; border: none; cursor: pointer;
            color: rgba(255,255,255,0.55); font-size: 11px; font-family: inherit;
            padding: 6px 10px; border-radius: 10px;
            transition: color 0.2s, background 0.2s; min-width: 52px;
        }
        .nav-btn .nav-icon { font-size: 20px; line-height: 1; }
        .nav-btn:hover, .nav-btn.active { color: var(--sky); }
        .nav-btn.active { background: rgba(14,165,233,0.12); }

        /* ── TOAST ── */
        #toast {
            position: fixed; bottom: 20px;
            left: 50%; transform: translateX(-50%) translateY(8px);
            background: rgba(15,23,42,0.92); color: #fff;
            padding: 10px 18px; border-radius: 999px;
            font-size: 13px; font-weight: 500; box-shadow: var(--shadow);
            z-index: 9000; opacity: 0; transition: opacity 0.25s, transform 0.25s;
            pointer-events: none; white-space: nowrap; max-width: calc(100vw - 32px);
            text-align: center;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── LEAFLET POPUP ── */
        .leaflet-popup-content-wrapper {
            border-radius: 14px !important; box-shadow: var(--shadow-lg) !important;
            padding: 0 !important; overflow: hidden;
            border: 1px solid var(--border); min-width: 240px;
        }
        .leaflet-popup-content { margin: 0 !important; }
        .leaflet-popup-tip-container { margin-top: -1px; }
        .popup-card { font-family: 'Inter', sans-serif; color: var(--text); }
        .popup-header {
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
            padding: 14px 14px 12px; display: flex; gap: 12px; align-items: center;
        }
        .popup-avatar {
            width: 52px; height: 52px; border-radius: 10px;
            object-fit: cover; border: 2px solid rgba(255,255,255,0.3);
            flex-shrink: 0; background: rgba(255,255,255,0.1);
        }
        .popup-avatar-placeholder {
            width: 52px; height: 52px; border-radius: 10px;
            background: rgba(255,255,255,0.15);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0;
        }
        .popup-name { font-size: 14px; font-weight: 700; color: #fff; line-height: 1.3; }
        .popup-id { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 2px; }
        .popup-title-badge {
            display: inline-block; background: rgba(14,165,233,0.25);
            color: #7dd3fc; border-radius: 999px; padding: 2px 8px;
            font-size: 11px; margin-top: 4px;
        }
        .popup-body { padding: 10px 14px; }
        .popup-row {
            display: flex; align-items: flex-start; gap: 8px;
            padding: 5px 0; border-bottom: 1px solid #f1f5f9; font-size: 13px;
        }
        .popup-row:last-child { border-bottom: none; }
        .popup-row .pi { font-size: 14px; flex-shrink: 0; margin-top: 1px; color: var(--text-muted); }
        .popup-row .pv { color: var(--text); line-height: 1.4; word-break: break-word; }
        .popup-row .pv a { color: var(--sky); text-decoration: none; }
        .popup-coords {
            background: #f8fafc; border: 1px solid var(--border);
            border-radius: 8px; padding: 6px 10px;
            font-size: 11px; color: var(--text-muted); font-family: monospace;
            margin-top: 8px;
        }
        .popup-actions {
            display: flex; gap: 6px; padding: 10px 14px 14px; flex-wrap: wrap;
        }
        .popup-action-btn {
            flex: 1; padding: 8px 4px; border-radius: 8px; border: 1.5px solid var(--border);
            font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
            background: var(--bg); color: var(--text); text-align: center;
            transition: all 0.15s; min-width: 60px;
        }
        .popup-action-btn:hover { background: #e0f2fe; border-color: var(--sky); color: var(--sky-dark); }
        .popup-action-btn.primary { background: var(--sky); color: #fff; border-color: var(--sky); }
        .popup-action-btn.primary:hover { background: var(--sky-dark); }

        /* ── CUSTOM MAP LABEL ── */
        .custom-label {
            background: none; border: none; box-shadow: none;
            font-weight: 700; font-size: 11px; color: var(--navy);
            text-shadow: 0 0 3px #fff, 0 0 6px #fff;
            font-family: 'Inter', sans-serif; pointer-events: none;
        }

        /* ── MODAL BASE ── */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(15,23,42,0.55);
            backdrop-filter: blur(4px);
            z-index: 6000; display: none;
            align-items: center; justify-content: center; padding: 16px;
        }
        .modal-overlay.open { display: flex; }
        .modal-card {
            width: min(420px, calc(100vw - 24px));
            max-height: calc(100vh - 32px);
            background: var(--white); border-radius: 18px;
            box-shadow: var(--shadow-lg); overflow: hidden;
            display: flex; flex-direction: column;
        }
        .modal-header {
            padding: 14px 16px 12px;
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
            color: #fff; font-size: 15px; font-weight: 700;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .modal-close {
            background: rgba(255,255,255,0.15); border: none; color: #fff;
            width: 28px; height: 28px; border-radius: 6px; cursor: pointer;
            font-size: 16px; display: flex; align-items: center; justify-content: center;
        }
        .modal-close:hover { background: rgba(255,255,255,0.25); }
        .modal-body { flex: 1; overflow-y: auto; padding: 16px; }
        .modal-footer {
            padding: 12px 16px 14px; border-top: 1px solid var(--border);
            display: flex; gap: 8px; flex-shrink: 0;
        }
        .fg { margin-bottom: 12px; }
        .fg label {
            display: block; font-size: 11px; font-weight: 600;
            color: var(--text-muted); margin-bottom: 4px;
            text-transform: uppercase; letter-spacing: 0.04em;
        }
        .fg input, .fg textarea, .fg select {
            width: 100%; padding: 9px 12px;
            border: 1.5px solid var(--border); border-radius: 8px;
            font-size: 14px; font-family: inherit; color: var(--text);
            outline: none; transition: border-color 0.2s; background: var(--bg);
        }
        .fg input:focus, .fg textarea:focus { border-color: var(--sky); background: #fff; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn {
            flex: 1; padding: 11px; border-radius: 10px; border: none;
            font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-secondary { background: var(--bg); color: var(--text); border: 1.5px solid var(--border) !important; }
        .btn-primary { background: var(--sky); color: #fff; }
        .btn-primary:hover { background: var(--sky-dark); }
        .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
        .btn-green { background: var(--green); color: #fff; }
        .btn-green:hover { background: #059669; }
        .coords-info { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
        .img-preview { margin-top: 10px; display: flex; justify-content: center; }
        .img-preview img { max-width: 100%; max-height: 120px; border-radius: 10px; object-fit: cover; }
        .loc-btn {
            width: 100%; padding: 10px; border-radius: 10px; border: 1.5px dashed var(--sky);
            background: #f0f9ff; color: var(--sky-dark); font-weight: 600; font-size: 13px;
            cursor: pointer; font-family: inherit; transition: background 0.2s;
        }
        .loc-btn:hover { background: #e0f2fe; }
        .cam-btn {
            width: 100%; padding: 10px; border-radius: 10px; border: 1.5px solid var(--border);
            background: var(--bg); color: var(--text); font-size: 13px; font-weight: 600;
            cursor: pointer; font-family: inherit; transition: background 0.2s;
        }
        .status-msg {
            font-size: 13px; padding: 10px 12px; border-radius: 10px;
            margin-top: 10px; display: none;
        }
        .status-msg.ok { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; display: block; }
        .status-msg.err { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; display: block; }

        /* ── USER LOCATION DOT ── */
        .user-dot {
            width: 18px; height: 18px; border-radius: 50%;
            background: #3b82f6; border: 3px solid #fff;
            box-shadow: 0 0 0 0 rgba(59,130,246,0.5), 0 2px 8px rgba(0,0,0,0.3);
            animation: pulse-dot 2s ease-out infinite;
        }
        @keyframes pulse-dot {
            0%   { box-shadow: 0 0 0 0   rgba(59,130,246,0.5), 0 2px 8px rgba(0,0,0,0.3); }
            70%  { box-shadow: 0 0 0 14px rgba(59,130,246,0),  0 2px 8px rgba(0,0,0,0.3); }
            100% { box-shadow: 0 0 0 0   rgba(59,130,246,0),   0 2px 8px rgba(0,0,0,0.3); }
        }

        /* ── ROUTE BAR ── */
        #routeBar {
            position: fixed;
            bottom: calc(var(--bottomnav-h) + var(--safe-bottom) + 10px);
            left: 50%; transform: translateX(-50%);
            background: rgba(15,23,42,0.94); color: #fff;
            border-radius: 999px; padding: 10px 16px;
            font-size: 13px; font-weight: 500;
            box-shadow: var(--shadow-lg);
            z-index: 4000; display: none;
            align-items: center; gap: 10px;
            white-space: nowrap; max-width: calc(100vw - 32px);
        }
        #routeBar.show { display: flex; }
        #routeBar .rb-close {
            background: rgba(255,255,255,0.15); border: none; color: #fff;
            border-radius: 6px; padding: 3px 8px; cursor: pointer;
            font-size: 12px; font-family: inherit; transition: background 0.15s;
            flex-shrink: 0;
        }
        #routeBar .rb-close:hover { background: rgba(255,255,255,0.28); }
        @media (min-width: 769px) { #routeBar { bottom: 20px; } }

        /* ── TOPBAR MENU BTNS (desktop) ── */
        .topbar-menu-btns { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
        .topbar-menu-btns button {
            width: 36px; height: 36px; border-radius: 8px; border: none;
            background: rgba(255,255,255,0.09); color: #fff; font-size: 17px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .topbar-menu-btns button:hover { background: rgba(255,255,255,0.2); }
        @media (max-width: 768px) { .topbar-menu-btns { display: none; } }

        /* ── TRANSPORT PICKER ── */
        .transport-sheet {
            width: 100%; max-width: 480px; margin: 0 auto;
            background: var(--white); border-radius: 20px 20px 0 0;
            padding: 0 16px 28px;
        }
        .t-handle { width: 36px; height: 4px; background: #cbd5e1; border-radius: 2px; margin: 14px auto 16px; }
        .t-title { font-size: 15px; font-weight: 700; text-align: center; margin-bottom: 16px; color: var(--text); }
        .t-opts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        .t-opt {
            display: flex; flex-direction: column; align-items: center;
            gap: 8px; padding: 20px 12px;
            border: 2.5px solid var(--border); border-radius: 14px;
            background: var(--bg); cursor: pointer; font-family: inherit;
            font-size: 13px; font-weight: 600; color: var(--text);
            transition: all 0.15s;
        }
        .t-opt .t-icon { font-size: 34px; line-height: 1; }
        .t-opt:hover { border-color: var(--sky); background: #f0f9ff; color: var(--sky-dark); }
        .t-opt:active { transform: scale(0.96); }
        .t-cancel {
            width: 100%; padding: 13px; border-radius: 12px;
            border: 1.5px solid var(--border); background: var(--bg);
            cursor: pointer; font-size: 14px; font-weight: 500; font-family: inherit;
            color: var(--text-muted); transition: background 0.15s;
        }
        .t-cancel:hover { background: #f1f5f9; }

        /* ── BOTTOM DRAWER ── */
        #drawerOverlay {
            position: fixed; inset: 0; background: rgba(15,23,42,0.45);
            backdrop-filter: blur(2px); z-index: 5500; display: none;
        }
        #drawerOverlay.open { display: block; }
        #drawer {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--white); border-radius: 20px 20px 0 0;
            box-shadow: 0 -8px 40px rgba(0,0,0,0.18);
            z-index: 5600; max-height: 82vh;
            display: flex; flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.34,1.1,0.64,1);
        }
        #drawer.open { transform: translateY(0); }
        .drawer-grip { width: 36px; height: 4px; background: #cbd5e1; border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }
        .drawer-hdr {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0;
        }
        .drawer-hdr-title { font-size: 15px; font-weight: 700; color: var(--text); }
        .drawer-body { flex: 1; overflow-y: auto; padding: 14px 16px 32px; }
        .drawer-add-btn {
            width: 30px; height: 30px; border-radius: 8px;
            background: var(--sky); border: none; color: #fff;
            font-size: 20px; line-height: 1; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.15s; flex-shrink: 0;
        }
        .drawer-add-btn:hover { background: var(--sky-dark); }
        /* Add item form preview */
        .url-preview { margin-top: 6px; font-size: 12px; color: var(--sky-dark); min-height: 18px; display: flex; align-items: center; gap: 6px; }
        .url-preview img { height: 22px; border-radius: 3px; vertical-align: middle; }

        /* Gallery */

<script>
// ── CONFIG ──
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSWWGTRtkbcls__sB1VlAcSJZTNvDigroNMJgqmce-1Ug3j181zS8VwyvZZb6jCs_W1tbFSq17YNK3B/pub?output=csv&t=' + Date.now();

const GAS_URL = 'https://script.google.com/macros/s/AKfycbynrcj-O7znfeIxxeaZCGMorCTsGkXIWY0_W9s-JHhHfqPDy8JRL9Q-ekuQVUO2aXKZ/exec';

// ── STATE ──
let map;
let markersCluster = L.markerClusterGroup({ maxClusterRadius: 40, showCoverageOnHover: false });
let markers = [];        // { lat, lon, name, marker, row, labelMarker }
let loadedData = [];     // raw row objects
let addMarkerMode = false;
let pendingNewMarker = false;
let editingIndex = null;
let editImageDataUrl = '';
let editImagePath = '';
let uPendingLat = null, uPendingLon = null;
let panelVisible = true;
let userDotMarker = null;
let userLatLon = null;
let routeLayer = null;
let pendingRouteDest = null;
let currentDrawerSection = '';

// ── TOAST ──
let toastTimer;
function showToast(msg, duration = 3000) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), duration);
}

// ── HELPERS ──
function normalizeText(s) {
    return String(s || '').normalize('NFD').replace(/\p{Diacritic}/gu, '').toLowerCase().trim();
}

function resolveImagePath(imgField) {
    if (!imgField) return '';
    const s = String(imgField).trim();
    if (!s) return '';
    // data URL hoặc URL đầy đủ → dùng nguyên
    if (/^data:/i.test(s) || /^https?:\/\//i.test(s)) return s;
    // Chuẩn hoá dấu gạch chéo
    const norm = s.replace(/\\/g, '/');
    // Lấy filename (bỏ mọi tiền tố thư mục)
    const filename = norm.split('/').filter(Boolean).pop() || '';
    if (!filename) return '';
    // Đảm bảo không bị double prefix nếu sheet đã lưu 'images/...'
    return `images/${filename.toLowerCase()}`;
}

// ── CSV PARSER (RFC 4180 compliant) ──
function parseCSV(text) {
    const rows = [];
    let col = '', record = [], inQuote = false;
    for (let i = 0; i < text.length; i++) {
        const ch = text[i], next = text[i + 1];
        if (inQuote) {
            if (ch === '"' && next === '"') { col += '"'; i++; }
            else if (ch === '"') { inQuote = false; }
            else { col += ch; }
        } else {
            if (ch === '"') { inQuote = true; }
            else if (ch === ',') { record.push(col); col = ''; }
            else if (ch === '\r' && next === '\n') { record.push(col); col = ''; rows.push(record); record = []; i++; }
            else if (ch === '\n' || ch === '\r') { record.push(col); col = ''; rows.push(record); record = []; }
            else { col += ch; }
        }
    }
    if (col || record.length > 0) { record.push(col); rows.push(record); }
    if (rows.length < 2) return [];
    const headers = rows[0].map(h => h.trim());
    return rows.slice(1)
        .filter(r => r.some(c => c.trim() !== ''))
        .map(r => {
            const obj = {};
            headers.forEach((h, i) => { obj[h] = (r[i] || '').trim(); });
            return obj;
        });
}

// ── ROW ACCESSORS ──
// Supports both English keys (from CSV header) and Vietnamese keys (from Excel)
function getField(row, keys, fallback = '') {
    if (!row) return fallback;
    const nk = {};
    Object.keys(row).forEach(k => { nk[normalizeText(k)] = row[k]; });
    for (const k of keys) {
        if (row[k] != null && row[k] !== '') return row[k];
        const nv = nk[normalizeText(k)];
        if (nv != null && nv !== '') return nv;
    }
    return fallback;
}

const FIELDS = {
    id:            ['ID', 'id', 'Id'],
    name:          ['name', 'Name', 'Tên', 'tên', 'ho_ten', 'Họ và tên'],
    latitude:      ['latitude', 'Latitude', 'lat', 'Lat'],
    longitude:     ['longitude', 'Longitude', 'lon', 'Lon', 'longtitude', 'Longtitude'],
    north:         ['N', 'n', 'north'],
    east:          ['E', 'e', 'east'],
    status:        ['trạng thái', 'trang_thai', 'Status', 'status'],
    homeAddress:   ['địa chỉ nhà riêng', 'dia_chi_nha', 'home_address', 'Home Address'],
    officeAddress: ['địa chỉ cơ quan', 'dia_chi_co_quan', 'office_address', 'Office Address'],
    phone1:        ['điện thoại 1', 'dien_thoai_1', 'phone1', 'Phone 1', 'Điện thoại 1'],
    phone2:        ['điện thoại 2', 'dien_thoai_2', 'phone2', 'Phone 2', 'Điện thoại 2'],
    facebook:      ['facebook', 'Facebook'],
    company:       ['cơ quan công tác', 'co_quan', 'company', 'Organization', 'Cơ quan công tác'],
    title:         ['chức vụ', 'chuc_vu', 'title', 'Title', 'Chức vụ'],
    image:         ['Hình ảnh', 'hình ảnh', 'Hinh anh', 'hinh anh', 'hinh_anh', 'image', 'Image', 'photo', 'Photo', 'avatar', 'Avatar']
};

function parseRow(row) {
    return {
        raw: row,
        id:            String(getField(row, FIELDS.id) || '').trim(),
        name:          String(getField(row, FIELDS.name) || '').trim(),
        lat:           parseFloat(getField(row, FIELDS.latitude, '')),
        lon:           parseFloat(getField(row, FIELDS.longitude, '')),
        north:         String(getField(row, FIELDS.north) || '').trim(),
        east:          String(getField(row, FIELDS.east) || '').trim(),
        status:        String(getField(row, FIELDS.status) || '').trim(),
        homeAddress:   String(getField(row, FIELDS.homeAddress) || '').trim(),
        officeAddress: String(getField(row, FIELDS.officeAddress) || '').trim(),
        phone1:        String(getField(row, FIELDS.phone1) || '').trim(),
        phone2:        String(getField(row, FIELDS.phone2) || '').trim(),
        facebook:      String(getField(row, FIELDS.facebook) || '').trim(),
        company:       String(getField(row, FIELDS.company) || '').trim(),
        title:         String(getField(row, FIELDS.title) || '').trim(),
        image:         String(getField(row, FIELDS.image) || '').trim()
    };
}

// ── POPUP HTML ──
function buildPopupHTML(row, idx) {
    const p = parseRow(row);
    const imgSrc = resolveImagePath(p.image);
    const avatar = imgSrc
        ? `<img class="popup-avatar" src="${imgSrc}" alt="${p.name}" onerror="this.style.display='none'">`
        : `<div class="popup-avatar-placeholder">👤</div>`;
    const coordsStr = isFinite(p.lat) && isFinite(p.lon)
        ? `${p.lat.toFixed(6)}, ${p.lon.toFixed(6)}`
        : 'Chưa có tọa độ';
    const rows = [];
    if (p.status)        rows.push(`<div class="popup-row"><span class="pi">📋</span><span class="pv">${p.status}</span></div>`);
    if (p.homeAddress)   rows.push(`<div class="popup-row"><span class="pi">🏠</span><span class="pv">${p.homeAddress}</span></div>`);
    if (p.officeAddress) rows.push(`<div class="popup-row"><span class="pi">🏢</span><span class="pv">${p.officeAddress}</span></div>`);
    if (p.company)       rows.push(`<div class="popup-row"><span class="pi">🏛</span><span class="pv">${p.company}</span></div>`);
    if (p.phone1 || p.phone2) {
        const ph = [p.phone1, p.phone2].filter(Boolean).map(n => `<a href="tel:${n}">${n}</a>`).join(' &nbsp;|&nbsp; ');
        rows.push(`<div class="popup-row"><span class="pi">📞</span><span class="pv">${ph}</span></div>`);
    }
    if (p.facebook) {
        const fbUrl = /^https?:\/\//.test(p.facebook) ? p.facebook : `https://facebook.com/${p.facebook}`;
        rows.push(`<div class="popup-row"><span class="pi">📘</span><span class="pv"><a href="${fbUrl}" target="_blank" rel="noopener">${p.facebook}</a></span></div>`);
    }
    const escapedName = (p.name || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
    const editBtn = Number.isInteger(idx)
        ? `<button class="popup-action-btn" onclick="openEditModal(${idx})">✏️ Chỉnh sửa</button>`
        : '';
    const routeBtn = (isFinite(p.lat) && isFinite(p.lon))
        ? `<button class="popup-action-btn primary" onclick="openTransportPicker(${p.lat},${p.lon},'${escapedName}')">🗺️ Chỉ đường</button>`
        : '';
    return `<div class="popup-card">
        <div class="popup-header">
            ${avatar}
            <div style="min-width:0">
                <div class="popup-name">${p.name || 'Không có tên'}</div>
                <div class="popup-id">${p.id || ''}</div>
                ${p.title ? `<div class="popup-title-badge">${p.title}</div>` : ''}
            </div>
        </div>
        <div class="popup-body">
            ${rows.join('')}
            <div class="popup-coords">📍 ${coordsStr}</div>
        </div>
        <div class="popup-actions">
            ${editBtn}
            ${routeBtn}
        </div>
    </div>`;
}

// ── ICON FACTORY ──
function buildIcon(p) {
    const imgSrc = resolveImagePath(p.image);
    if (imgSrc && !/^data:/.test(imgSrc)) {
        return L.icon({ iconUrl: imgSrc, iconSize: [40, 40], iconAnchor: [20, 20], popupAnchor: [0, -22], className: 'custom-image-icon' });
    }
    return L.icon({ iconUrl: 'images/blank.png', iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -16] });
}

// ── MAP INIT ──
function initMap() {
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 22, attribution: '© OpenStreetMap' });
    const sat = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { maxZoom: 22, subdomains: ['mt0','mt1','mt2','mt3'], attribution: '© Google' });
    map = L.map('map', { center: [10.762622, 106.660172], zoom: 13, maxZoom: 22, layers: [osm] });
    L.control.layers({ 'OpenStreetMap': osm, 'Vệ tinh': sat }, {}, { position: 'topright' }).addTo(map);
    map.addLayer(markersCluster);
    map.on('click', e => {
        document.getElementById('searchResultsDropdown').style.display = 'none';
        if (pendingNewMarker) openEditModalAt(e.latlng.lat, e.latlng.lng);
    });
}

// ── ADD MARKER TO MAP ──
function addRowToMap(row, idx) {
    const p = parseRow(row);
    if (!isFinite(p.lat) || !isFinite(p.lon)) return null;
    const icon = buildIcon(p);
    const marker = L.marker([p.lat, p.lon], { icon });
    marker.bindPopup(buildPopupHTML(row, idx), { maxWidth: 320, minWidth: 240 });
    marker.on('popupopen', () => marker.setPopupContent(buildPopupHTML(markers[idx]?.row || row, idx)));
    marker.on('dblclick', () => openEditModal(idx));
    markersCluster.addLayer(marker);
    let labelMarker = null;
    if (p.name) {
        labelMarker = L.marker([p.lat, p.lon], {
            icon: L.divIcon({ className: 'custom-label', html: `<div>${p.name}</div>`, iconSize: [120, 20], iconAnchor: [60, 28] }),
            interactive: false
        }).addTo(map);
    }
    markers[idx] = { lat: p.lat, lon: p.lon, name: p.name, marker, row, labelMarker };
    return marker;
}

function renderAllMarkers() {
    markersCluster.clearLayers();
    markers.forEach(m => { if (m && m.labelMarker) map.removeLayer(m.labelMarker); });
    markers = [];
    loadedData.forEach((row, i) => addRowToMap(row, i));
    const valid = markers.filter(Boolean);
    if (valid.length > 0) {
        try { map.fitBounds(markersCluster.getBounds().pad(0.1)); } catch(e) {}
    }
}

// ── PANEL (student list) ──
function buildPanelList(data) {
    const list = document.getElementById('panelList');
    const count = document.getElementById('panelCount');
    count.textContent = data.length;
    list.innerHTML = '';
    if (data.length === 0) {
        list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px">Không có dữ liệu</div>';
        return;
    }
    const frag = document.createDocumentFragment();
    data.forEach(({ row, origIdx }) => {
        const p = parseRow(row);
        const imgSrc = resolveImagePath(p.image);
        const hasCoords = isFinite(p.lat) && isFinite(p.lon);
        const div = document.createElement('div');
        div.className = 'panel-item';
        div.dataset.idx = origIdx;
        if (imgSrc) {
            div.innerHTML = `<img class="panel-avatar" src="${imgSrc}" alt="${p.name}" onerror="this.outerHTML='<div class=\\'panel-avatar-placeholder\\'>👤</div>'">`;
        } else {
            div.innerHTML = `<div class="panel-avatar-placeholder">👤</div>`;
        }
        div.innerHTML += `
            <div class="panel-item-info">
                <div class="panel-item-name">${p.name || '(Chưa có tên)'}</div>
                <div class="panel-item-sub">${p.company || p.officeAddress || p.id || ''}</div>
            </div>
            ${!hasCoords ? '<span class="panel-no-coords" title="Chưa có tọa độ">⚠</span>' : ''}
        `;
        div.addEventListener('click', () => {
            document.querySelectorAll('.panel-item').forEach(el => el.classList.remove('active'));
            div.classList.add('active');
            if (hasCoords) {
                map.setView([p.lat, p.lon], 17);
                const entry = markers[origIdx];
                if (entry) setTimeout(() => entry.marker.openPopup(), 300);
            } else {
                showToast(`${p.name}: chưa có tọa độ`);
            }
            if (window.innerWidth <= 768) closePanelMobile();
        });
        frag.appendChild(div);
    });
    list.appendChild(frag);
}

function filterPanelList(q) {
    const norm = normalizeText(q);
    const items = document.querySelectorAll('.panel-item');
    items.forEach(el => {
        const name = normalizeText(el.querySelector('.panel-item-name')?.textContent || '');
        const sub  = normalizeText(el.querySelector('.panel-item-sub')?.textContent || '');
        el.style.display = (!norm || name.includes(norm) || sub.includes(norm)) ? '' : 'none';
    });
}

// ── DATA LOADING ──
async function loadData() {
    if (location.protocol === 'file:') {
        document.getElementById('panelLoading').innerHTML =
            '⚠️ Mở file trực tiếp từ máy tính — fetch bị chặn.<br>Hãy dùng <b>Live Server</b> hoặc deploy lên <b>GitHub Pages</b>.';
        return;
    }
    document.getElementById('panelLoading').textContent = '⏳ Đang tải từ Google Sheet...';
    try {
        const res = await fetch(SHEET_CSV_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        const data = parseCSV(text);
        if (data.length === 0) throw new Error('CSV rỗng');
        loadedData = data;
        showToast(`Đã tải ${data.length} học viên từ Google Sheet`);
    } catch(e) {
        console.warn('Google Sheet load failed:', e.message);
        showToast('Không tải được Google Sheet, thử file cục bộ...');
        try { await loadLocalExcel(); } catch(e2) { showToast('Không tải được dữ liệu: ' + e2.message); }
    }
    finishLoading();
}

async function loadLocalExcel() {
    const res = await fetch('data/danhsach.xlsx');
    if (!res.ok) throw new Error('Không tìm thấy data/danhsach.xlsx');
    const buf = await res.arrayBuffer();
    const wb = XLSX.read(new Uint8Array(buf), { type: 'array' });
    const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' });
    loadedData = data.filter(r => Object.values(r).some(v => v !== ''));
}

function finishLoading() {
    // Log mẫu để kiểm tra đường dẫn ảnh
    if (loadedData.length > 0) {
        const sample = parseRow(loadedData[0]);
        console.log('[K76] Mẫu dòng 1:', sample);
        console.log('[K76] Ảnh dòng 1 (raw):', sample.image, '→ resolved:', resolveImagePath(sample.image));
    }
    renderAllMarkers();
    const panelData = loadedData.map((row, i) => ({ row, origIdx: i }));
    buildPanelList(panelData);
    document.getElementById('panelCount').textContent = loadedData.length;
    if (document.getElementById('panelLoading')) document.getElementById('panelLoading').remove();
}

function searchMarkers() {

    const dropdown = document.getElementById('searchResultsDropdown');

    list.innerHTML = ''; dropdown.style.display = 'none';
    if (!raw) return;
    const norm = normalizeText(raw);
    const matches = markers.map((m, i) => ({ m, i })).filter(({ m }) => m && normalizeText(m.name).includes(norm));
    if (matches.length === 0) {
        showToast('Không tìm thấy kết quả'); return;
    }
    if (matches.length === 1) {
        const { m } = matches[0];
        map.setView([m.lat, m.lon], 17);

        showToast(`Đã tìm: ${m.name}`); return;
    }
    matches.forEach(({ m, i }) => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#';
        a.innerHTML = `<span>📍</span>${m.name} <span style="color:var(--text-muted);font-size:11px;margin-left:4px">${m.lat.toFixed(4)}, ${m.lon.toFixed(4)}</span>`;

function saveLocalOnly() {

    if (!row) return;
    applyRowLocally(row);
    closeEditModal();
    showToast('Đã lưu cục bộ');
}

function applyRowLocally(row) {
    const p = parseRow(row);
    if (editingIndex !== null) {
        loadedData[editingIndex] = row;
        const entry = markers[editingIndex];
        if (entry && isFinite(p.lat) && isFinite(p.lon)) {
            entry.row = row; entry.lat = p.lat; entry.lon = p.lon; entry.name = p.name;
            markersCluster.removeLayer(entry.marker);
            entry.marker.setLatLng([p.lat, p.lon]);
            entry.marker.setIcon(buildIcon(p));
            entry.marker.setPopupContent(buildPopupHTML(row, editingIndex));
            markersCluster.addLayer(entry.marker);
            if (entry.labelMarker) {
                entry.labelMarker.setLatLng([p.lat, p.lon]);
                entry.labelMarker.setIcon(L.divIcon({ className:'custom-label', html:`<div>${p.name}</div>`, iconSize:[120,20], iconAnchor:[60,28] }));
            }
            map.setView([p.lat, p.lon], 17);
            entry.marker.openPopup();
        }
    } else {
        loadedData.push(row);
        const nm = addRowToMap(row, loadedData.length - 1);
        if (nm) { map.setView([nm.getLatLng().lat, nm.getLatLng().lng], 17); nm.openPopup(); }
    }
    // Refresh panel
    buildPanelList(loadedData.map((r, i) => ({ row: r, origIdx: i })));
}

// ── GOOGLE APPS SCRIPT SYNC ──
async function gasGet(params) {
    const url = GAS_URL + '?' + new URLSearchParams(params).toString();
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json().catch(() => ({}));
}

async function submitToGAS() {
    const row = collectEditRow();
    if (!row) return;
    const btn = document.getElementById('gasBtn');
    const statusEl = document.getElementById('editStatus');
    btn.disabled = true; btn.textContent = '⏳ Đang gửi...';
    statusEl.textContent = 'Đang kết nối Google Apps Script...';
    statusEl.className = 'status-msg ok';
    try {
        const json = await gasGet({ action: 'update', data: JSON.stringify(row) });
        if (json.status === 'ok') {
            statusEl.textContent = '✅ Đã đồng bộ lên Google Sheet thành công!';
            statusEl.className = 'status-msg ok';
            showToast('Đồng bộ thành công!');

        showToast('Lỗi kết nối Apps Script');

        btn.disabled = false; btn.textContent = '📡 Lưu & Đồng bộ';
    }
}

// ── IMAGE HANDLING ──
function handleEditImageFile(event) {
    const file = event.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => resizeImage(e.target.result, (resized, err) => {
        if (resized) {
            editImageDataUrl = resized;
            editImagePath = `images/${file.name}`;
            document.getElementById('fImagePreview').innerHTML = `<img src="${resized}" alt="">`;
            showToast('Ảnh sẵn sàng');
        } else {
            showToast(err || 'Lỗi ảnh');
        }
    });
    reader.readAsDataURL(file);
}

function resizeImage(dataUrl, callback) {
    const img = new Image();
    img.onload = () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        let w = img.width, h = img.height;
        const scale = Math.min(1, 400 / Math.max(w, h));
        w = Math.round(w * scale); h = Math.round(h * scale);
        canvas.width = w; canvas.height = h;
        ctx.drawImage(img, 0, 0, w, h);
        callback(canvas.toDataURL('image/jpeg', 0.85));
    };
    img.onerror = () => callback('', 'Không đọc được ảnh');
    img.src = dataUrl;
}

async function submitLocationUpdate() {
    const name = document.getElementById('uName').value.trim();
    if (!name) { showToast('Vui lòng nhập tên'); return; }
    if (!isFinite(uPendingLat)) { showToast('Vui lòng lấy vị trí GPS trước'); return; }
    const gasUrl = GAS_URL;
    const btn = document.getElementById('uSubmitBtn');
    const statusEl = document.getElementById('updateStatus');
    btn.disabled = true; btn.textContent = '⏳ Đang gửi...';
    statusEl.textContent = 'Đang kết nối...';
    statusEl.className = 'status-msg ok';
    try {
        const json = await gasGet({ action: 'updateCoords', name, lat: uPendingLat, lon: uPendingLon });
        if (json.status === 'ok') {
            statusEl.textContent = `✅ Đã cập nhật vị trí của "${name}" thành công!`;
            statusEl.className = 'status-msg ok';
            showToast('Cập nhật thành công!');
            // Apply locally
            const norm = normalizeText(name);
            for (let i = 0; i < loadedData.length; i++) {
                const p = parseRow(loadedData[i]);
                if (normalizeText(p.name) === norm || p.id === name) {
                    loadedData[i]['latitude'] = uPendingLat;
                    loadedData[i]['longtitude'] = uPendingLon;
                    const entry = markers[i];
                    if (entry) {
                        entry.lat = uPendingLat; entry.lon = uPendingLon;
                        markersCluster.removeLayer(entry.marker);
                        entry.marker.setLatLng([uPendingLat, uPendingLon]);
                        entry.marker.setPopupContent(buildPopupHTML(loadedData[i], i));
                        markersCluster.addLayer(entry.marker);
                        if (entry.labelMarker) entry.labelMarker.setLatLng([uPendingLat, uPendingLon]);
                        map.setView([uPendingLat, uPendingLon], 17);
                    }
                    break;
                }
            }
            setTimeout(() => document.getElementById('updateModal').classList.remove('open'), 2500);
        } else {
            throw new Error(json.message || 'Lỗi không xác định');
        }
    } catch(e) {
        statusEl.textContent = '❌ Lỗi: ' + e.message;
        statusEl.className = 'status-msg err';
    } finally {
        btn.disabled = false; btn.textContent = '📡 Cập nhật';
    }
}

// ── LOCATION ──
function updateUserDot(lat, lon) {
    userLatLon = [lat, lon];
    if (!userDotMarker) {
        const icon = L.divIcon({ className: '', iconSize: [18, 18], iconAnchor: [9, 9], html: '<div class="user-dot"></div>' });
        userDotMarker = L.marker([lat, lon], { icon, zIndexOffset: 1000 }).addTo(map);
        userDotMarker.bindTooltip('Vị trí của bạn', { permanent: false, direction: 'top', offset: [0, -10] });
    } else {
        userDotMarker.setLatLng([lat, lon]);
    }
}

function centerOnUserLocation() {
    if (!navigator.geolocation) { showToast('Trình duyệt không hỗ trợ GPS'); return; }
    navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude, lon = pos.coords.longitude;
        updateUserDot(lat, lon);
        map.setView([lat, lon], 17);
        showToast('Đã định vị vị trí của bạn');
    }, e => showToast('Không lấy được GPS: ' + e.message), { enableHighAccuracy: true, timeout: 15000 });
}

// ── TRANSPORT PICKER ──
function openTransportPicker(lat, lon, name) {
    pendingRouteDest = { lat, lon, name };
    document.getElementById('transportPicker').classList.add('open');
}
function closeTransportPicker() {
    document.getElementById('transportPicker').classList.remove('open');
    pendingRouteDest = null;
}
function confirmTransport(mode) {
    const dest = pendingRouteDest;
    closeTransportPicker();
    if (!dest) return;
    routeToMarker(dest.lat, dest.lon, dest.name, mode);
}

// ── ROUTING ──
async function routeToMarker(destLat, destLon, destName, mode = 'car') {
    map.closePopup();
    if (userLatLon) {
        await drawRoute(userLatLon[0], userLatLon[1], destLat, destLon, destName, mode);
    } else {
        if (!navigator.geolocation) { showToast('Trình duyệt không hỗ trợ GPS'); return; }
        showToast('⏳ Đang lấy vị trí GPS...');
        navigator.geolocation.getCurrentPosition(async pos => {
            updateUserDot(pos.coords.latitude, pos.coords.longitude);
            await drawRoute(userLatLon[0], userLatLon[1], destLat, destLon, destName, mode);
        }, e => showToast('Không lấy được GPS: ' + e.message), { enableHighAccuracy: true, timeout: 15000 });
    }
}

async function drawRoute(fromLat, fromLon, toLat, toLon, toName, mode = 'car') {
    showToast('⏳ Đang tính lộ trình...');
    clearRoute();
    const isMoto = mode === 'motorcycle';
    const color  = isMoto ? '#f97316' : '#0ea5e9';
    const icon   = isMoto ? '🏍️' : '🚗';
    try {
        const url = `https://router.project-osrm.org/route/v1/driving/${fromLon},${fromLat};${toLon},${toLat}?overview=full&geometries=geojson`;
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 10000);
        const res = await fetch(url, { signal: ctrl.signal });
        clearTimeout(timer);
        const data = await res.json();
        if (data.code !== 'Ok' || !data.routes.length) throw new Error('Không tìm được lộ trình');
        routeLayer = L.geoJSON(data.routes[0].geometry, {
            style: { color, weight: 5, opacity: 0.85, lineCap: 'round', lineJoin: 'round' }
        }).addTo(map);
        map.fitBounds(routeLayer.getBounds().pad(0.12));
        const km   = (data.routes[0].distance / 1000).toFixed(1);
        const mins = Math.round(data.routes[0].duration / 60);
        document.getElementById('routeBarText').textContent = `${icon} Đến ${toName}: ${km} km · ~${mins} phút`;
        document.getElementById('routeBar').classList.add('show');
    } catch(e) {
        window.open(`https://www.google.com/maps/dir/${fromLat},${fromLon}/${toLat},${toLon}`, '_blank');
        showToast('Mở Google Maps để chỉ đường');
    }
}

function clearRoute() {
    if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
    document.getElementById('routeBar').classList.remove('show');
}

let DATA_BOOKS = [];

const DATA_HISTORY = [

    { date: '02/05/2026', title: 'Sửa lỗi ảnh 404 trên GitHub Pages', desc: 'Linux phân biệt hoa/thường — đổi toàn bộ tên ảnh về chữ thường.' },
    { date: '02/05/2026', title: 'Chỉ đường từ vị trí hiện tại', desc: 'Vẽ lộ trình thực tế qua OSRM, dự phòng mở Google Maps.' },

];

// ── DRAWER ──

        gallery: { title: '📸 Hình ảnh kỷ niệm', render: renderGallery },
        books:   { title: '📚 Kiến thức',         render: renderBooks   },

    document.getElementById('drawer').classList.add('open');

function closeDrawer() {
    document.getElementById('drawerOverlay').classList.remove('open');

// ── ADD ITEM MODAL ──

    const isGallery = currentDrawerSection === 'gallery';
    document.getElementById('addItemTitle').textContent = isGallery ? '📸 Thêm ảnh / video' : '📚 Thêm tài liệu';
    document.getElementById('addItemBody').innerHTML = isGallery ? `

        <div class="fg">
            <label>Tiêu đề <span style="color:var(--red)">*</span></label>
            <input id="aiTitle" type="text" placeholder="VD: Album lễ khai giảng">
        </div>
        <div class="fg">
            <label>Mô tả</label>
            <input id="aiDesc" type="text" placeholder="VD: Tháng 9/2024">

        <div class="fg">

function closeAddItemModal() {
    document.getElementById('addItemModal').classList.remove('open');
}

function previewGalleryUrl() {
    const url = (document.getElementById('aiUrl')?.value || '').trim();
    const el = document.getElementById('aiUrlPreview');
    if (!el) return;
    if (!url) { el.innerHTML = ''; return; }
    try {
        const m = url.match(/(?:v=|youtu\.be\/)([^&?/]+)/);
        if (m) { el.innerHTML = `▶️ YouTube <img src="https://img.youtube.com/vi/${m[1]}/default.jpg" alt="">`; return; }
        if (url.includes('drive.google.com')) { el.innerHTML = '📂 Google Drive'; return; }
        if (url.includes('photos.google'))    { el.innerHTML = '📷 Google Photos'; return; }
        el.innerHTML = '🔗 ' + new URL(url).hostname;
    } catch(_) { el.innerHTML = ''; }
}

async function submitAddItem() {
    const isGallery = currentDrawerSection === 'gallery';
    const title  = document.getElementById('aiTitle')?.value.trim() || '';
    const url    = document.getElementById('aiUrl')?.value.trim()   || '';
    const desc   = document.getElementById('aiDesc')?.value.trim()  || '';
    const statusEl = document.getElementById('addItemStatus');
    const btn    = document.getElementById('addItemBtn');

    if (!title) { showToast('Vui lòng nhập tiêu đề'); document.getElementById('aiTitle')?.focus(); return; }
    if (!url)   { showToast('Vui lòng nhập đường link'); document.getElementById('aiUrl')?.focus(); return; }

    let item;
    if (isGallery) {
        const m = url.match(/(?:v=|youtu\.be\/)([^&?/]+)/);
        const type = url.includes('drive.google') ? 'drive'
                   : (url.includes('youtube') || url.includes('youtu.be')) ? 'youtube'
                   : url.includes('photos.google') ? 'photo' : 'link';
        item = { title, desc, url, type, videoId: m ? m[1] : '' };
    } else {
        item = {
            title, desc, url,
            tag:  document.getElementById('aiTag')?.value.trim()  || '',
            icon: document.getElementById('aiIcon')?.value.trim() || '📖',
        };
    }

    btn.disabled = true; btn.textContent = '⏳ Đang lưu...';
    statusEl.className = 'status-msg ok'; statusEl.textContent = 'Đang kết nối Google Sheet...';
    try {
        const action = isGallery ? 'addGallery' : 'addBook';
        const res = await gasGet({ action, data: JSON.stringify(item) });
        if (res.status !== 'ok') throw new Error(res.message || 'Lỗi không xác định');
        if (isGallery) DATA_GALLERY.push(item);
        else           DATA_BOOKS.push(item);
        statusEl.textContent = '✅ Đã lưu thành công lên Google Sheet!';
        document.getElementById('drawerBody').innerHTML = isGallery ? renderGallery() : renderBooks();
        showToast('Đã thêm thành công!');
        setTimeout(closeAddItemModal, 1600);
    } catch(e) {
        statusEl.className = 'status-msg err';
        statusEl.textContent = '❌ Lỗi: ' + e.message;
        btn.disabled = false; btn.textContent = '💾 Lưu lên Google Sheet';
    }
}

// ── LOAD DRAWER DATA FROM GAS ──
async function loadDrawerData() {
    if (!GAS_URL || GAS_URL.length < 20) return;
    try {
        const [gallRes, bookRes] = await Promise.all([
            gasGet({ action: 'getGallery' }),
            gasGet({ action: 'getBooks'   }),
        ]);
        if (gallRes.status === 'ok' && Array.isArray(gallRes.data)) DATA_GALLERY = gallRes.data;
        if (bookRes.status === 'ok' && Array.isArray(bookRes.data)) DATA_BOOKS   = bookRes.data;
        console.log('[K76] Drawer data:', DATA_GALLERY.length, 'gallery,', DATA_BOOKS.length, 'books');
    } catch(e) {
        console.warn('[K76] loadDrawerData failed:', e.message);
    }
}

function renderGallery() {
    if (!DATA_GALLERY.length)
        return '<p style="color:var(--text-muted);font-size:13px;text-align:center;padding:24px 0">Chưa có nội dung.<br>Thêm link vào <b>DATA_GALLERY</b> trong mã nguồn.</p>';
    const cards = DATA_GALLERY.map(item => {
        const thumb = buildGalleryThumb(item);
        const sub = item.desc || (item.type === 'youtube' ? 'YouTube' : item.type === 'drive' ? 'Google Drive' : 'Xem');
        return `<a class="gallery-card" href="${item.url}" target="_blank" rel="noopener">
            <div class="gallery-thumb">${thumb}</div>
            <div class="gallery-lbl"><div class="gl-title">${item.title}</div><div class="gl-sub">${sub}</div></div>
        </a>`;
    }).join('');
    return `<div class="gallery-grid">${cards}</div>`;
}
function buildGalleryThumb(item) {
    const url = item.url || '';
    if (item.videoId) return `<img src="https://img.youtube.com/vi/${item.videoId}/mqdefault.jpg" alt="">`;
    const m = url.match(/(?:v=|youtu\.be\/)([^&?/]+)/);
    if (m) return `<img src="https://img.youtube.com/vi/${m[1]}/mqdefault.jpg" alt="">`;
    if (url.includes('drive.google.com') || url.includes('photos.google')) return '📂';
    return item.icon || '🖼️';
}

function renderBooks() {
    if (!DATA_BOOKS.length)
        return '<p style="color:var(--text-muted);font-size:13px;text-align:center;padding:24px 0">Chưa có nội dung.<br>Thêm sách vào <b>DATA_BOOKS</b> trong mã nguồn.</p>';
    return `<div class="book-list">${DATA_BOOKS.map(b => `
        <a class="book-card" href="${b.url}" target="_blank" rel="noopener">
            <span class="bk-icon">${b.icon || '📖'}</span>
            <div><div class="bk-title">${b.title}</div>${b.desc ? `<div class="bk-desc">${b.desc}</div>` : ''}${b.tag ? `<span class="bk-tag">${b.tag}</span>` : ''}</div>
        </a>`).join('')}</div>`;
}

function renderHistory() {
    return `<div class="hist-list">${DATA_HISTORY.map(h => `
        <div class="hist-item">
            <div class="hist-dot"></div>
            <div><div class="hist-date">${h.date}</div><div class="hist-title">${h.title}</div>${h.desc ? `<div class="hist-desc">${h.desc}</div>` : ''}</div>
        </div>`).join('')}</div>`;
}
