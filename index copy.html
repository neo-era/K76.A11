<!DOCTYPE html>
<html lang="vi">
<head>
    <title>K76.A11 — Bản đồ lớp</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="author" content="Mai Vũ Lâm">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --navy: #0f172a;
            --navy2: #1e293b;
            --sky: #0ea5e9;
            --sky-dark: #0284c7;
            --green: #10b981;
            --amber: #f59e0b;
            --red: #ef4444;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --bg: #f8fafc;
            --white: #ffffff;
            --radius: 12px;
            --shadow: 0 4px 20px rgba(0,0,0,0.12);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.18);
            --topbar-h: 56px;
            --bottomnav-h: 64px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --panel-w: 300px;
        }

        html, body {
            height: 100%; width: 100%;
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            background: var(--navy);
            color: var(--text);
        }

        /* ── TOP BAR ── */
        #topBar {
            position: fixed; top: 0; left: 0; right: 0;
            height: var(--topbar-h);
            background: rgba(15,23,42,0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; gap: 10px;
            padding: 0 12px;
            z-index: 3000;
        }
        .topbar-brand {
            font-size: 15px; font-weight: 700;
            background: linear-gradient(135deg, var(--sky), #818cf8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            flex-shrink: 0; white-space: nowrap;
        }
        .topbar-search {
            flex: 1; display: flex; align-items: center;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 999px; overflow: hidden;
            max-width: 500px;
        }
        .topbar-search input {
            flex: 1; border: none; background: transparent;
            color: #fff; font-size: 14px; padding: 0 14px;
            outline: none; height: 36px;
        }
        .topbar-search input::placeholder { color: rgba(255,255,255,0.4); }
        .topbar-search button {
            width: 36px; height: 36px; border: none; background: var(--sky);
            color: #fff; cursor: pointer; font-size: 15px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; border-radius: 0 999px 999px 0;
            transition: background 0.2s;
        }
        .topbar-search button:hover { background: var(--sky-dark); }
        #searchResultsDropdown {
            position: fixed; top: var(--topbar-h); left: 12px; right: 12px;
            max-width: 524px; background: var(--white);
            border-radius: var(--radius); box-shadow: var(--shadow-lg);
            max-height: 280px; overflow-y: auto;
            z-index: 3100; display: none;
        }
        #searchResultsDropdown ul { list-style: none; padding: 6px 0; }
        #searchResultsDropdown li a {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 16px; color: var(--text); text-decoration: none;
            font-size: 13px; transition: background 0.15s;
        }
        #searchResultsDropdown li a:hover { background: #f1f5f9; }

        /* ── LEFT PANEL ── */
        #leftPanel {
            position: fixed;
            top: var(--topbar-h); left: 0; bottom: 0;
            width: var(--panel-w);
            background: var(--white);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            z-index: 2000;
            transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
            box-shadow: 2px 0 12px rgba(0,0,0,0.08);
        }
        #leftPanel.hidden { transform: translateX(-100%); }
        .panel-header {
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
            color: #fff; padding: 14px 16px;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .panel-header-title { font-size: 14px; font-weight: 700; }
        .panel-header-count {
            background: rgba(14,165,233,0.3); color: #7dd3fc;
            border-radius: 999px; padding: 2px 8px; font-size: 12px;
        }
        .panel-search {
            padding: 10px 12px; flex-shrink: 0;
            border-bottom: 1px solid var(--border);
        }
        .panel-search input {
            width: 100%; padding: 8px 12px;
            border: 1.5px solid var(--border); border-radius: 8px;
            font-size: 13px; font-family: inherit; outline: none;
            transition: border-color 0.2s; background: var(--bg);
        }
        .panel-search input:focus { border-color: var(--sky); }
        .panel-list { flex: 1; overflow-y: auto; }
        .panel-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.15s;
        }
        .panel-item:hover { background: #f0f9ff; }
        .panel-item.active { background: #e0f2fe; }
        .panel-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            object-fit: cover; flex-shrink: 0;
            border: 2px solid var(--border);
            background: #f1f5f9;
        }
        .panel-avatar-placeholder {
            width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
            background: linear-gradient(135deg, #e2e8f0, #cbd5e1);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
        }
        .panel-item-info { min-width: 0; flex: 1; }
        .panel-item-name {
            font-size: 13px; font-weight: 600; color: var(--text);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .panel-item-sub {
            font-size: 11px; color: var(--text-muted);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-top: 2px;
        }
        .panel-item-badge {
            font-size: 10px; padding: 2px 6px; border-radius: 999px;
            background: #dbeafe; color: #1d4ed8; flex-shrink: 0;
        }
        .panel-no-coords { color: #f59e0b; font-size: 14px; flex-shrink: 0; }
        #panelLoading {
            padding: 20px; text-align: center; color: var(--text-muted); font-size: 13px;
        }

        /* Panel toggle button */
        #panelToggle {
            position: fixed;
            top: calc(var(--topbar-h) + 12px);
            left: calc(var(--panel-w) + 8px);
            z-index: 2100;
            background: var(--white); border: 1px solid var(--border);
            border-radius: 8px; width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 16px;
            box-shadow: var(--shadow);
            transition: left 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        #panelToggle.panel-hidden { left: 8px; }

        /* ── MAP ── */
        #map {
            position: fixed;
            top: var(--topbar-h);
            left: var(--panel-w);
            right: 0;
            bottom: 0;
            z-index: 1;
            transition: left 0.3s cubic-bezier(0.4,0,0.2,1);
        }
        #map.panel-hidden { left: 0; }

        /* ── BOTTOM NAV (mobile only) ── */
        #bottomNav {
            display: none;
            position: fixed; bottom: 0; left: 0; right: 0;
            height: calc(var(--bottomnav-h) + var(--safe-bottom));
            padding-bottom: var(--safe-bottom);
            background: rgba(15,23,42,0.95);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255,255,255,0.08);
            align-items: center; justify-content: space-around;
            z-index: 3000;
        }
        .nav-btn {
            display: flex; flex-direction: column; align-items: center; gap: 3px;
            background: transparent; border: none; cursor: pointer;
            color: rgba(255,255,255,0.55); font-size: 11px; font-family: inherit;
            padding: 6px 10px; border-radius: 10px;
            transition: color 0.2s, background 0.2s; min-width: 52px;
        }
        .nav-btn .nav-icon { font-size: 20px; line-height: 1; }
        .nav-btn:hover, .nav-btn.active { color: var(--sky); }
        .nav-btn.active { background: rgba(14,165,233,0.12); }

        /* ── TOAST ── */
        #toast {
            position: fixed; bottom: 20px;
            left: 50%; transform: translateX(-50%) translateY(8px);
            background: rgba(15,23,42,0.92); color: #fff;
            padding: 10px 18px; border-radius: 999px;
            font-size: 13px; font-weight: 500; box-shadow: var(--shadow);
            z-index: 9000; opacity: 0; transition: opacity 0.25s, transform 0.25s;
            pointer-events: none; white-space: nowrap; max-width: calc(100vw - 32px);
            text-align: center;
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── LEAFLET POPUP ── */
        .leaflet-popup-content-wrapper {
            border-radius: 14px !important; box-shadow: var(--shadow-lg) !important;
            padding: 0 !important; overflow: hidden;
            border: 1px solid var(--border); min-width: 240px;
        }
        .leaflet-popup-content { margin: 0 !important; }
        .leaflet-popup-tip-container { margin-top: -1px; }
        .popup-card { font-family: 'Inter', sans-serif; color: var(--text); }
        .popup-header {
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
            padding: 14px 14px 12px; display: flex; gap: 12px; align-items: center;
        }
        .popup-avatar {
            width: 52px; height: 52px; border-radius: 10px;
            object-fit: cover; border: 2px solid rgba(255,255,255,0.3);
            flex-shrink: 0; background: rgba(255,255,255,0.1);
        }
        .popup-avatar-placeholder {
            width: 52px; height: 52px; border-radius: 10px;
            background: rgba(255,255,255,0.15);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0;
        }
        .popup-name { font-size: 14px; font-weight: 700; color: #fff; line-height: 1.3; }
        .popup-id { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 2px; }
        .popup-title-badge {
            display: inline-block; background: rgba(14,165,233,0.25);
            color: #7dd3fc; border-radius: 999px; padding: 2px 8px;
            font-size: 11px; margin-top: 4px;
        }
        .popup-body { padding: 10px 14px; }
        .popup-row {
            display: flex; align-items: flex-start; gap: 8px;
            padding: 5px 0; border-bottom: 1px solid #f1f5f9; font-size: 13px;
        }
        .popup-row:last-child { border-bottom: none; }
        .popup-row .pi { font-size: 14px; flex-shrink: 0; margin-top: 1px; color: var(--text-muted); }
        .popup-row .pv { color: var(--text); line-height: 1.4; word-break: break-word; }
        .popup-row .pv a { color: var(--sky); text-decoration: none; }
        .popup-coords {
            background: #f8fafc; border: 1px solid var(--border);
            border-radius: 8px; padding: 6px 10px;
            font-size: 11px; color: var(--text-muted); font-family: monospace;
            margin-top: 8px;
        }
        .popup-actions {
            display: flex; gap: 6px; padding: 10px 14px 14px; flex-wrap: wrap;
        }
        .popup-action-btn {
            flex: 1; padding: 8px 4px; border-radius: 8px; border: 1.5px solid var(--border);
            font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit;
            background: var(--bg); color: var(--text); text-align: center;
            transition: all 0.15s; min-width: 60px;
        }
        .popup-action-btn:hover { background: #e0f2fe; border-color: var(--sky); color: var(--sky-dark); }
        .popup-action-btn.primary { background: var(--sky); color: #fff; border-color: var(--sky); }
        .popup-action-btn.primary:hover { background: var(--sky-dark); }

        /* ── CUSTOM MAP LABEL ── */
        .custom-label {
            background: none; border: none; box-shadow: none;
            font-weight: 700; font-size: 11px; color: var(--navy);
            text-shadow: 0 0 3px #fff, 0 0 6px #fff;
            font-family: 'Inter', sans-serif; pointer-events: none;
        }

        /* ── MODAL BASE ── */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(15,23,42,0.55);
            backdrop-filter: blur(4px);
            z-index: 6000; display: none;
            align-items: center; justify-content: center; padding: 16px;
        }
        .modal-overlay.open { display: flex; }
        .modal-card {
            width: min(420px, calc(100vw - 24px));
            max-height: calc(100vh - 32px);
            background: var(--white); border-radius: 18px;
            box-shadow: var(--shadow-lg); overflow: hidden;
            display: flex; flex-direction: column;
        }
        .modal-header {
            padding: 14px 16px 12px;
            background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
            color: #fff; font-size: 15px; font-weight: 700;
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .modal-close {
            background: rgba(255,255,255,0.15); border: none; color: #fff;
            width: 28px; height: 28px; border-radius: 6px; cursor: pointer;
            font-size: 16px; display: flex; align-items: center; justify-content: center;
        }
        .modal-close:hover { background: rgba(255,255,255,0.25); }
        .modal-body { flex: 1; overflow-y: auto; padding: 16px; }
        .modal-footer {
            padding: 12px 16px 14px; border-top: 1px solid var(--border);
            display: flex; gap: 8px; flex-shrink: 0;
        }
        .fg { margin-bottom: 12px; }
        .fg label {
            display: block; font-size: 11px; font-weight: 600;
            color: var(--text-muted); margin-bottom: 4px;
            text-transform: uppercase; letter-spacing: 0.04em;
        }
        .fg input, .fg textarea, .fg select {
            width: 100%; padding: 9px 12px;
            border: 1.5px solid var(--border); border-radius: 8px;
            font-size: 14px; font-family: inherit; color: var(--text);
            outline: none; transition: border-color 0.2s; background: var(--bg);
        }
        .fg input:focus, .fg textarea:focus { border-color: var(--sky); background: #fff; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn {
            flex: 1; padding: 11px; border-radius: 10px; border: none;
            font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:active { transform: scale(0.97); }
        .btn-secondary { background: var(--bg); color: var(--text); border: 1.5px solid var(--border) !important; }
        .btn-primary { background: var(--sky); color: #fff; }
        .btn-primary:hover { background: var(--sky-dark); }
        .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
        .btn-green { background: var(--green); color: #fff; }
        .btn-green:hover { background: #059669; }
        .coords-info { font-size: 12px; color: var(--text-muted); margin-top: 6px; }
        .img-preview { margin-top: 10px; display: flex; justify-content: center; }
        .img-preview img { max-width: 100%; max-height: 120px; border-radius: 10px; object-fit: cover; }
        .loc-btn {
            width: 100%; padding: 10px; border-radius: 10px; border: 1.5px dashed var(--sky);
            background: #f0f9ff; color: var(--sky-dark); font-weight: 600; font-size: 13px;
            cursor: pointer; font-family: inherit; transition: background 0.2s;
        }
        .loc-btn:hover { background: #e0f2fe; }
        .cam-btn {
            width: 100%; padding: 10px; border-radius: 10px; border: 1.5px solid var(--border);
            background: var(--bg); color: var(--text); font-size: 13px; font-weight: 600;
            cursor: pointer; font-family: inherit; transition: background 0.2s;
        }
        .status-msg {
            font-size: 13px; padding: 10px 12px; border-radius: 10px;
            margin-top: 10px; display: none;
        }
        .status-msg.ok { background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; display: block; }
        .status-msg.err { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; display: block; }

        /* ── LEAFLET OVERRIDES ── */
        .leaflet-control-zoom { border-radius: 10px !important; overflow: hidden; box-shadow: var(--shadow) !important; }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            :root { --panel-w: 0px; }
            #leftPanel {
                width: 300px;
                transform: translateX(-100%);
                z-index: 4500;
            }
            #leftPanel.open {
                transform: translateX(0);
            }
            #panelToggle { display: none; }
            #map { left: 0 !important; bottom: calc(var(--bottomnav-h) + var(--safe-bottom)); }
            #bottomNav { display: flex; }
            .topbar-brand { display: none; }
            #toast { bottom: calc(var(--bottomnav-h) + var(--safe-bottom) + 12px); }
            #leftPanelOverlay {
                position: fixed; inset: 0; background: rgba(0,0,0,0.4);
                z-index: 4400; display: none; backdrop-filter: blur(2px);
            }
            #leftPanelOverlay.open { display: block; }
        }
        @media (min-width: 769px) {
            #leftPanelOverlay { display: none !important; }
        }
    </style>
</head>
<body>

<!-- ── TOP BAR ── -->
<header id="topBar">
    <div class="topbar-brand">🎓 K76.A11</div>
    <div class="topbar-search">
        <input type="text" id="searchInput" placeholder="Tìm tên học viên..." autocomplete="off"
            onkeydown="if(event.key==='Enter')searchMarkers()">
        <button onclick="searchMarkers()">🔍</button>
    </div>
</header>

<!-- Search dropdown -->
<div id="searchResultsDropdown"><ul id="searchResultsList"></ul></div>

<!-- Panel toggle (desktop) -->
<button id="panelToggle" onclick="togglePanel()" title="Ẩn/hiện danh sách">◀</button>

<!-- ── LEFT PANEL ── -->
<div id="leftPanelOverlay" onclick="closePanelMobile()"></div>
<aside id="leftPanel">
    <div class="panel-header">
        <span class="panel-header-title">📋 Danh sách học viên</span>
        <span class="panel-header-count" id="panelCount">0</span>
    </div>
    <div class="panel-search">
        <input type="text" id="panelSearchInput" placeholder="Tìm trong danh sách..."
            oninput="filterPanelList(this.value)">
    </div>
    <div class="panel-list" id="panelList">
        <div id="panelLoading">⏳ Đang tải dữ liệu...</div>
    </div>
</aside>

<!-- Map -->
<div id="map"></div>

<!-- Toast -->
<div id="toast"></div>

<!-- ── BOTTOM NAV (mobile) ── -->
<nav id="bottomNav">
    <button class="nav-btn" onclick="openPanelMobile()">
        <span class="nav-icon">📋</span><span>Danh sách</span>
    </button>
    <button class="nav-btn" onclick="centerOnUserLocation()">
        <span class="nav-icon">📍</span><span>Vị trí</span>
    </button>
    <button class="nav-btn" id="addMarkerBtn" onclick="startAddMarker()">
        <span class="nav-icon" id="addMarkerIcon">➕</span><span id="addMarkerLabel">Thêm</span>
    </button>
    <button class="nav-btn" onclick="openUpdateModal()">
        <span class="nav-icon">📡</span><span>Cập nhật</span>
    </button>
</nav>

<!-- ── EDIT / ADD MARKER MODAL ── -->
<div id="editModal" class="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal-card" id="editModalCard">
        <div class="modal-header">
            <span id="editModalTitle">Chỉnh sửa thông tin</span>
            <button class="modal-close" onclick="closeEditModal()">✕</button>
        </div>
        <div class="modal-body">
            <div class="fg">
                <label>ID học viên</label>
                <input id="fId" type="text" placeholder="VD: K76.A11.001">
            </div>
            <div class="fg">
                <label>Họ và tên <span style="color:var(--red)">*</span></label>
                <input id="fName" type="text" placeholder="Nhập họ và tên">
            </div>
            <div class="fg">
                <label>Chức vụ</label>
                <input id="fTitle" type="text" placeholder="Chức vụ / học hàm">
            </div>
            <div class="fg">
                <label>Cơ quan công tác</label>
                <input id="fCompany" type="text" placeholder="Tên cơ quan">
            </div>
            <div class="fg">
                <label>Địa chỉ nhà riêng</label>
                <input id="fHomeAddress" type="text" placeholder="Địa chỉ nhà">
            </div>
            <div class="fg">
                <label>Địa chỉ cơ quan</label>
                <input id="fOfficeAddress" type="text" placeholder="Địa chỉ cơ quan">
            </div>
            <div class="form-row">
                <div class="fg"><label>Điện thoại 1</label><input id="fPhone1" type="tel" placeholder="SĐT 1"></div>
                <div class="fg"><label>Điện thoại 2</label><input id="fPhone2" type="tel" placeholder="SĐT 2"></div>
            </div>
            <div class="fg">
                <label>Facebook</label>
                <input id="fFacebook" type="text" placeholder="Link hoặc username Facebook">
            </div>
            <div class="fg">
                <label>Trạng thái</label>
                <input id="fStatus" type="text" placeholder="VD: Đang học, Nghỉ phép...">
            </div>
            <div class="form-row">
                <div class="fg"><label>Latitude</label><input id="fLat" type="text" placeholder="10.xxx"></div>
                <div class="fg"><label>Longitude</label><input id="fLon" type="text" placeholder="106.xxx"></div>
            </div>
            <div class="fg">
                <button class="loc-btn" onclick="setEditLocation()">📍 Lấy vị trí GPS hiện tại</button>
            </div>
            <div id="fCoordsInfo" class="coords-info">Tọa độ: —</div>
            <div class="fg" style="margin-top:8px">
                <button class="cam-btn" onclick="document.getElementById('fImageInput').click()">📷 Chụp / chọn ảnh</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script>
// ── CONFIG ──
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSWWGTRtkbcls__sB1VlAcSJZTNvDigroNMJgqmce-1Ug3j181zS8VwyvZZb6jCs_W1tbFSq17YNK3B/pub?output=csv&t=' + Date.now();

const GAS_URL = 'https://script.google.com/macros/s/AKfycbynrcj-O7znfeIxxeaZCGMorCTsGkXIWY0_W9s-JHhHfqPDy8JRL9Q-ekuQVUO2aXKZ/exec';

// ── STATE ──
let map;
let markersCluster = L.markerClusterGroup({ maxClusterRadius: 40, showCoverageOnHover: false });
let markers = [];        // { lat, lon, name, marker, row, labelMarker }
let loadedData = [];     // raw row objects
let addMarkerMode = false;
let pendingNewMarker = false;
let editingIndex = null;
let editImageDataUrl = '';
let editImagePath = '';
let uPendingLat = null, uPendingLon = null;
let panelVisible = true;

// ── TOAST ──
let toastTimer;
function showToast(msg, duration = 3000) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), duration);
}

// ── HELPERS ──
function normalizeText(s) {
    return String(s || '').normalize('NFD').replace(/\p{Diacritic}/gu, '').toLowerCase().trim();
}

function resolveImagePath(imgField) {
    if (!imgField) return '';
    const s = String(imgField).trim();
    if (!s) return '';
    // data URL hoặc URL đầy đủ → dùng nguyên
    if (/^data:/i.test(s) || /^https?:\/\//i.test(s)) return s;
    // Chuẩn hoá dấu gạch chéo
    const norm = s.replace(/\\/g, '/');
    // Lấy filename (bỏ mọi tiền tố thư mục)
    const filename = norm.split('/').filter(Boolean).pop() || '';
    if (!filename) return '';
    // Đảm bảo không bị double prefix nếu sheet đã lưu 'images/...'
    return `images/${filename.toLowerCase()}`;
}

// ── CSV PARSER (RFC 4180 compliant) ──
function parseCSV(text) {
    const rows = [];
    let col = '', record = [], inQuote = false;
    for (let i = 0; i < text.length; i++) {
        const ch = text[i], next = text[i + 1];
        if (inQuote) {
            if (ch === '"' && next === '"') { col += '"'; i++; }
            else if (ch === '"') { inQuote = false; }
            else { col += ch; }
        } else {
            if (ch === '"') { inQuote = true; }
            else if (ch === ',') { record.push(col); col = ''; }
            else if (ch === '\r' && next === '\n') { record.push(col); col = ''; rows.push(record); record = []; i++; }
            else if (ch === '\n' || ch === '\r') { record.push(col); col = ''; rows.push(record); record = []; }
            else { col += ch; }
        }
    }
    if (col || record.length > 0) { record.push(col); rows.push(record); }
    if (rows.length < 2) return [];
    const headers = rows[0].map(h => h.trim());
    return rows.slice(1)
        .filter(r => r.some(c => c.trim() !== ''))
        .map(r => {
            const obj = {};
            headers.forEach((h, i) => { obj[h] = (r[i] || '').trim(); });
            return obj;
        });
}

// ── ROW ACCESSORS ──
// Supports both English keys (from CSV header) and Vietnamese keys (from Excel)
function getField(row, keys, fallback = '') {
    if (!row) return fallback;
    const nk = {};
    Object.keys(row).forEach(k => { nk[normalizeText(k)] = row[k]; });
    for (const k of keys) {
        if (row[k] != null && row[k] !== '') return row[k];
        const nv = nk[normalizeText(k)];
        if (nv != null && nv !== '') return nv;
    }
    return fallback;
}

const FIELDS = {
    id:            ['ID', 'id', 'Id'],
    name:          ['name', 'Name', 'Tên', 'tên', 'ho_ten', 'Họ và tên'],
    latitude:      ['latitude', 'Latitude', 'lat', 'Lat'],
    longitude:     ['longitude', 'Longitude', 'lon', 'Lon', 'longtitude', 'Longtitude'],
    north:         ['N', 'n', 'north'],
    east:          ['E', 'e', 'east'],
    status:        ['trạng thái', 'trang_thai', 'Status', 'status'],
    homeAddress:   ['địa chỉ nhà riêng', 'dia_chi_nha', 'home_address', 'Home Address'],
    officeAddress: ['địa chỉ cơ quan', 'dia_chi_co_quan', 'office_address', 'Office Address'],
    phone1:        ['điện thoại 1', 'dien_thoai_1', 'phone1', 'Phone 1', 'Điện thoại 1'],
    phone2:        ['điện thoại 2', 'dien_thoai_2', 'phone2', 'Phone 2', 'Điện thoại 2'],
    facebook:      ['facebook', 'Facebook'],
    company:       ['cơ quan công tác', 'co_quan', 'company', 'Organization', 'Cơ quan công tác'],
    title:         ['chức vụ', 'chuc_vu', 'title', 'Title', 'Chức vụ'],
    image:         ['Hình ảnh', 'hình ảnh', 'Hinh anh', 'hinh anh', 'hinh_anh', 'image', 'Image', 'photo', 'Photo', 'avatar', 'Avatar']
};

function parseRow(row) {
    return {
        raw: row,
        id:            String(getField(row, FIELDS.id) || '').trim(),
        name:          String(getField(row, FIELDS.name) || '').trim(),
        lat:           parseFloat(getField(row, FIELDS.latitude, '')),
        lon:           parseFloat(getField(row, FIELDS.longitude, '')),
        north:         String(getField(row, FIELDS.north) || '').trim(),
        east:          String(getField(row, FIELDS.east) || '').trim(),
        status:        String(getField(row, FIELDS.status) || '').trim(),
        homeAddress:   String(getField(row, FIELDS.homeAddress) || '').trim(),
        officeAddress: String(getField(row, FIELDS.officeAddress) || '').trim(),
        phone1:        String(getField(row, FIELDS.phone1) || '').trim(),
        phone2:        String(getField(row, FIELDS.phone2) || '').trim(),
        facebook:      String(getField(row, FIELDS.facebook) || '').trim(),
        company:       String(getField(row, FIELDS.company) || '').trim(),
        title:         String(getField(row, FIELDS.title) || '').trim(),
        image:         String(getField(row, FIELDS.image) || '').trim()
    };
}

// ── POPUP HTML ──
function buildPopupHTML(row, idx) {
    const p = parseRow(row);
    const imgSrc = resolveImagePath(p.image);
    const avatar = imgSrc
        ? `<img class="popup-avatar" src="${imgSrc}" alt="${p.name}" onerror="this.style.display='none'">`
        : `<div class="popup-avatar-placeholder">👤</div>`;
    const coordsStr = isFinite(p.lat) && isFinite(p.lon)
        ? `${p.lat.toFixed(6)}, ${p.lon.toFixed(6)}`
        : 'Chưa có tọa độ';
    const rows = [];
    if (p.status)        rows.push(`<div class="popup-row"><span class="pi">📋</span><span class="pv">${p.status}</span></div>`);
    if (p.homeAddress)   rows.push(`<div class="popup-row"><span class="pi">🏠</span><span class="pv">${p.homeAddress}</span></div>`);
    if (p.officeAddress) rows.push(`<div class="popup-row"><span class="pi">🏢</span><span class="pv">${p.officeAddress}</span></div>`);
    if (p.company)       rows.push(`<div class="popup-row"><span class="pi">🏛</span><span class="pv">${p.company}</span></div>`);
    if (p.phone1 || p.phone2) {
        const ph = [p.phone1, p.phone2].filter(Boolean).map(n => `<a href="tel:${n}">${n}</a>`).join(' &nbsp;|&nbsp; ');
        rows.push(`<div class="popup-row"><span class="pi">📞</span><span class="pv">${ph}</span></div>`);
    }
    if (p.facebook) {
        const fbUrl = /^https?:\/\//.test(p.facebook) ? p.facebook : `https://facebook.com/${p.facebook}`;
        rows.push(`<div class="popup-row"><span class="pi">📘</span><span class="pv"><a href="${fbUrl}" target="_blank" rel="noopener">${p.facebook}</a></span></div>`);
    }
    const editBtn = Number.isInteger(idx)
        ? `<button class="popup-action-btn" onclick="openEditModal(${idx})">✏️ Chỉnh sửa</button>`
        : '';
    return `<div class="popup-card">
        <div class="popup-header">
            ${avatar}
            <div style="min-width:0">
                <div class="popup-name">${p.name || 'Không có tên'}</div>
                <div class="popup-id">${p.id || ''}</div>
                ${p.title ? `<div class="popup-title-badge">${p.title}</div>` : ''}
            </div>
        </div>
        <div class="popup-body">
            ${rows.join('')}
            <div class="popup-coords">📍 ${coordsStr}</div>
        </div>
        <div class="popup-actions">
            ${editBtn}
            <button class="popup-action-btn primary" onclick="openUpdateModalForMe('${(p.name||'').replace(/'/g,"\\'")}')">📍 Cập nhật vị trí</button>
        </div>
    </div>`;
}

// ── ICON FACTORY ──
function buildIcon(p) {
    const imgSrc = resolveImagePath(p.image);
    if (imgSrc && !/^data:/.test(imgSrc)) {
        return L.icon({ iconUrl: imgSrc, iconSize: [40, 40], iconAnchor: [20, 20], popupAnchor: [0, -22], className: 'custom-image-icon' });
    }
    return L.icon({ iconUrl: 'images/blank.png', iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -16] });
}

// ── MAP INIT ──
function initMap() {
    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 22, attribution: '© OpenStreetMap' });
    const sat = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { maxZoom: 22, subdomains: ['mt0','mt1','mt2','mt3'], attribution: '© Google' });
    map = L.map('map', { center: [10.762622, 106.660172], zoom: 13, maxZoom: 22, layers: [osm] });
    L.control.layers({ 'OpenStreetMap': osm, 'Vệ tinh': sat }, {}, { position: 'topright' }).addTo(map);
    map.addLayer(markersCluster);
    map.on('click', e => {
        document.getElementById('searchResultsDropdown').style.display = 'none';
        if (pendingNewMarker) openEditModalAt(e.latlng.lat, e.latlng.lng);
    });
}

// ── ADD MARKER TO MAP ──
function addRowToMap(row, idx) {
    const p = parseRow(row);
    if (!isFinite(p.lat) || !isFinite(p.lon)) return null;
    const icon = buildIcon(p);
    const marker = L.marker([p.lat, p.lon], { icon });
    marker.bindPopup(buildPopupHTML(row, idx), { maxWidth: 320, minWidth: 240 });
    marker.on('popupopen', () => marker.setPopupContent(buildPopupHTML(markers[idx]?.row || row, idx)));
    marker.on('dblclick', () => openEditModal(idx));
    markersCluster.addLayer(marker);
    let labelMarker = null;
    if (p.name) {
        labelMarker = L.marker([p.lat, p.lon], {
            icon: L.divIcon({ className: 'custom-label', html: `<div>${p.name}</div>`, iconSize: [120, 20], iconAnchor: [60, 28] }),
            interactive: false
        }).addTo(map);
    }
    markers[idx] = { lat: p.lat, lon: p.lon, name: p.name, marker, row, labelMarker };
    return marker;
}

function renderAllMarkers() {
    markersCluster.clearLayers();
    markers.forEach(m => { if (m && m.labelMarker) map.removeLayer(m.labelMarker); });
    markers = [];
    loadedData.forEach((row, i) => addRowToMap(row, i));
    const valid = markers.filter(Boolean);
    if (valid.length > 0) {
        try { map.fitBounds(markersCluster.getBounds().pad(0.1)); } catch(e) {}
    }
}

// ── PANEL (student list) ──
function buildPanelList(data) {
    const list = document.getElementById('panelList');
    const count = document.getElementById('panelCount');
    count.textContent = data.length;
    list.innerHTML = '';
    if (data.length === 0) {
        list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px">Không có dữ liệu</div>';
        return;
    }
    const frag = document.createDocumentFragment();
    data.forEach(({ row, origIdx }) => {
        const p = parseRow(row);
        const imgSrc = resolveImagePath(p.image);
        const hasCoords = isFinite(p.lat) && isFinite(p.lon);
        const div = document.createElement('div');
        div.className = 'panel-item';
        div.dataset.idx = origIdx;
        if (imgSrc) {
            div.innerHTML = `<img class="panel-avatar" src="${imgSrc}" alt="${p.name}" onerror="this.outerHTML='<div class=\\'panel-avatar-placeholder\\'>👤</div>'">`;
        } else {
            div.innerHTML = `<div class="panel-avatar-placeholder">👤</div>`;
        }
        div.innerHTML += `
            <div class="panel-item-info">
                <div class="panel-item-name">${p.name || '(Chưa có tên)'}</div>
                <div class="panel-item-sub">${p.company || p.officeAddress || p.id || ''}</div>
            </div>
            ${!hasCoords ? '<span class="panel-no-coords" title="Chưa có tọa độ">⚠</span>' : ''}
        `;
        div.addEventListener('click', () => {
            document.querySelectorAll('.panel-item').forEach(el => el.classList.remove('active'));
            div.classList.add('active');
            if (hasCoords) {
                map.setView([p.lat, p.lon], 17);
                const entry = markers[origIdx];
                if (entry) setTimeout(() => entry.marker.openPopup(), 300);
            } else {
                showToast(`${p.name}: chưa có tọa độ`);
            }
            if (window.innerWidth <= 768) closePanelMobile();
        });
        frag.appendChild(div);
    });
    list.appendChild(frag);
}

function filterPanelList(q) {
    const norm = normalizeText(q);
    const items = document.querySelectorAll('.panel-item');
    items.forEach(el => {
        const name = normalizeText(el.querySelector('.panel-item-name')?.textContent || '');
        const sub  = normalizeText(el.querySelector('.panel-item-sub')?.textContent || '');
        el.style.display = (!norm || name.includes(norm) || sub.includes(norm)) ? '' : 'none';
    });
}

// ── PANEL TOGGLE ──
function togglePanel() {
    panelVisible = !panelVisible;
    const panel = document.getElementById('leftPanel');
    const toggle = document.getElementById('panelToggle');
    const mapEl = document.getElementById('map');
    if (panelVisible) {
        panel.classList.remove('hidden');
        mapEl.classList.remove('panel-hidden');
        toggle.textContent = '◀';
        toggle.classList.remove('panel-hidden');
    } else {
        panel.classList.add('hidden');
        mapEl.classList.add('panel-hidden');
        toggle.textContent = '▶';
        toggle.classList.add('panel-hidden');
    }
    setTimeout(() => map.invalidateSize(), 350);
}

function openPanelMobile() {
    document.getElementById('leftPanel').classList.add('open');
    document.getElementById('leftPanelOverlay').classList.add('open');
}
function closePanelMobile() {
    document.getElementById('leftPanel').classList.remove('open');
    document.getElementById('leftPanelOverlay').classList.remove('open');
}

// ── DATA LOADING ──
async function loadData() {
    if (location.protocol === 'file:') {
        document.getElementById('panelLoading').innerHTML =
            '⚠️ Mở file trực tiếp từ máy tính — fetch bị chặn.<br>Hãy dùng <b>Live Server</b> hoặc deploy lên <b>GitHub Pages</b>.';
        return;
    }
    document.getElementById('panelLoading').textContent = '⏳ Đang tải từ Google Sheet...';
    try {
        const res = await fetch(SHEET_CSV_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        const data = parseCSV(text);
        if (data.length === 0) throw new Error('CSV rỗng');
        loadedData = data;
        showToast(`Đã tải ${data.length} học viên từ Google Sheet`);
    } catch(e) {
        console.warn('Google Sheet load failed:', e.message);
        showToast('Không tải được Google Sheet, thử file cục bộ...');
        try { await loadLocalExcel(); } catch(e2) { showToast('Không tải được dữ liệu: ' + e2.message); }
    }
    finishLoading();
}

async function loadLocalExcel() {
    const res = await fetch('data/danhsach.xlsx');
    if (!res.ok) throw new Error('Không tìm thấy data/danhsach.xlsx');
    const buf = await res.arrayBuffer();
    const wb = XLSX.read(new Uint8Array(buf), { type: 'array' });
    const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' });
    loadedData = data.filter(r => Object.values(r).some(v => v !== ''));
}

function finishLoading() {
    // Log mẫu để kiểm tra đường dẫn ảnh
    if (loadedData.length > 0) {
        const sample = parseRow(loadedData[0]);
        console.log('[K76] Mẫu dòng 1:', sample);
        console.log('[K76] Ảnh dòng 1 (raw):', sample.image, '→ resolved:', resolveImagePath(sample.image));
    }
    renderAllMarkers();
    const panelData = loadedData.map((row, i) => ({ row, origIdx: i }));
    buildPanelList(panelData);
    document.getElementById('panelCount').textContent = loadedData.length;
    if (document.getElementById('panelLoading')) document.getElementById('panelLoading').remove();
}

// ── SEARCH ──
function searchMarkers() {
    const raw = document.getElementById('searchInput').value.trim();
    const dropdown = document.getElementById('searchResultsDropdown');
    const list = document.getElementById('searchResultsList');
    list.innerHTML = ''; dropdown.style.display = 'none';
    if (!raw) return;
    const norm = normalizeText(raw);
    const matches = markers.map((m, i) => ({ m, i })).filter(({ m }) => m && normalizeText(m.name).includes(norm));
    if (matches.length === 0) {
        showToast('Không tìm thấy kết quả'); return;
    }
    if (matches.length === 1) {
        const { m } = matches[0];
        map.setView([m.lat, m.lon], 17);
        setTimeout(() => m.marker.openPopup(), 200);
        showToast(`Đã tìm: ${m.name}`); return;
    }
    matches.forEach(({ m, i }) => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = '#';
        a.innerHTML = `<span>📍</span>${m.name} <span style="color:var(--text-muted);font-size:11px;margin-left:4px">${m.lat.toFixed(4)}, ${m.lon.toFixed(4)}</span>`;
        a.onclick = ev => {
            ev.preventDefault();
            map.setView([m.lat, m.lon], 17);
            setTimeout(() => m.marker.openPopup(), 200);
            dropdown.style.display = 'none';
            document.getElementById('searchInput').value = m.name;
        };
        li.appendChild(a);
        list.appendChild(li);
    });
    dropdown.style.display = 'block';
    showToast(`Tìm thấy ${matches.length} kết quả`);
}
document.addEventListener('click', e => {
    if (!e.target.closest('#searchResultsDropdown') && !e.target.closest('.topbar-search'))
        document.getElementById('searchResultsDropdown').style.display = 'none';
});

// ── EDIT MODAL ──
function openEditModal(idx) {
    editingIndex = idx;
    pendingNewMarker = false; addMarkerMode = false;
    updateAddBtn();
    const row = loadedData[idx];
    const p = parseRow(row);
    document.getElementById('editModalTitle').textContent = '✏️ Chỉnh sửa: ' + (p.name || '');
    setEditFields(p);
    document.getElementById('editStatus').className = 'status-msg';
    document.getElementById('editModal').classList.add('open');
}

function openEditModalAt(lat, lon) {
    editingIndex = null;
    document.getElementById('editModalTitle').textContent = '➕ Thêm học viên';
    setEditFields({ lat, lon });
    document.getElementById('fCoordsInfo').textContent = `Tọa độ: ${lat.toFixed(6)}, ${lon.toFixed(6)}`;
    document.getElementById('editStatus').className = 'status-msg';
    document.getElementById('editModal').classList.add('open');
    document.getElementById('fName').focus();
}

function setEditFields(p) {
    document.getElementById('fId').value = p.id || '';
    document.getElementById('fName').value = p.name || '';
    document.getElementById('fTitle').value = p.title || '';
    document.getElementById('fCompany').value = p.company || '';
    document.getElementById('fHomeAddress').value = p.homeAddress || '';
    document.getElementById('fOfficeAddress').value = p.officeAddress || '';
    document.getElementById('fPhone1').value = p.phone1 || '';
    document.getElementById('fPhone2').value = p.phone2 || '';
    document.getElementById('fFacebook').value = p.facebook || '';
    document.getElementById('fStatus').value = p.status || '';
    document.getElementById('fLat').value = isFinite(p.lat) ? p.lat : '';
    document.getElementById('fLon').value = isFinite(p.lon) ? p.lon : '';
    document.getElementById('fCoordsInfo').textContent = isFinite(p.lat)
        ? `Tọa độ: ${parseFloat(p.lat).toFixed(6)}, ${parseFloat(p.lon).toFixed(6)}`
        : 'Tọa độ: —';
    editImageDataUrl = '';
    editImagePath = p.image ? resolveImagePath(p.image) : '';
    const preview = document.getElementById('fImagePreview');
    const imgSrc = resolveImagePath(p.image || '');
    preview.innerHTML = imgSrc ? `<img src="${imgSrc}" alt="">` : '';
    document.getElementById('fImageInput').value = '';
}

function closeEditModal() {
    document.getElementById('editModal').classList.remove('open');
    editingIndex = null; editImageDataUrl = ''; editImagePath = '';
}

function setEditLocation() {
    if (!navigator.geolocation) { showToast('Trình duyệt không hỗ trợ GPS'); return; }
    navigator.geolocation.getCurrentPosition(p => {
        const lat = p.coords.latitude, lon = p.coords.longitude;
        document.getElementById('fLat').value = lat.toFixed(6);
        document.getElementById('fLon').value = lon.toFixed(6);
        document.getElementById('fCoordsInfo').textContent = `Tọa độ: ${lat.toFixed(6)}, ${lon.toFixed(6)}`;
        showToast('Đã cập nhật tọa độ GPS');
    }, e => showToast('Không lấy được GPS: ' + e.message));
}

function collectEditRow() {
    const name = document.getElementById('fName').value.trim();
    if (!name) { showToast('Vui lòng nhập họ tên'); document.getElementById('fName').focus(); return null; }
    const lat = parseFloat(document.getElementById('fLat').value);
    const lon = parseFloat(document.getElementById('fLon').value);
    return {
        'ID': document.getElementById('fId').value.trim(),
        'name': name,
        'latitude': isFinite(lat) ? lat : '',
        'longtitude': isFinite(lon) ? lon : '',
        'N': '', 'E': '',
        'trạng thái': document.getElementById('fStatus').value.trim(),
        'địa chỉ nhà riêng': document.getElementById('fHomeAddress').value.trim(),
        'địa chỉ cơ quan': document.getElementById('fOfficeAddress').value.trim(),
        'cơ quan công tác': document.getElementById('fCompany').value.trim(),
        'điện thoại 1': document.getElementById('fPhone1').value.trim(),
        'điện thoại 2': document.getElementById('fPhone2').value.trim(),
        'facebook': document.getElementById('fFacebook').value.trim(),
        'chức vụ': document.getElementById('fTitle').value.trim(),
        'hình ảnh': editImagePath || (editImageDataUrl.startsWith('data:') ? editImageDataUrl : '')
    };
}

function saveLocalOnly() {
    const row = collectEditRow();
    if (!row) return;
    applyRowLocally(row);
    closeEditModal();
    showToast('Đã lưu cục bộ');
}

function applyRowLocally(row) {
    const p = parseRow(row);
    if (editingIndex !== null) {
        loadedData[editingIndex] = row;
        const entry = markers[editingIndex];
        if (entry && isFinite(p.lat) && isFinite(p.lon)) {
            entry.row = row; entry.lat = p.lat; entry.lon = p.lon; entry.name = p.name;
            markersCluster.removeLayer(entry.marker);
            entry.marker.setLatLng([p.lat, p.lon]);
            entry.marker.setIcon(buildIcon(p));
            entry.marker.setPopupContent(buildPopupHTML(row, editingIndex));
            markersCluster.addLayer(entry.marker);
            if (entry.labelMarker) {
                entry.labelMarker.setLatLng([p.lat, p.lon]);
                entry.labelMarker.setIcon(L.divIcon({ className:'custom-label', html:`<div>${p.name}</div>`, iconSize:[120,20], iconAnchor:[60,28] }));
            }
            map.setView([p.lat, p.lon], 17);
            entry.marker.openPopup();
        }
    } else {
        loadedData.push(row);
        const nm = addRowToMap(row, loadedData.length - 1);
        if (nm) { map.setView([nm.getLatLng().lat, nm.getLatLng().lng], 17); nm.openPopup(); }
    }
    // Refresh panel
    buildPanelList(loadedData.map((r, i) => ({ row: r, origIdx: i })));
}

// ── GOOGLE APPS SCRIPT SYNC ──
async function gasGet(params) {
    const url = GAS_URL + '?' + new URLSearchParams(params).toString();
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json().catch(() => ({}));
}

async function submitToGAS() {
    const row = collectEditRow();
    if (!row) return;
    const btn = document.getElementById('gasBtn');
    const statusEl = document.getElementById('editStatus');
    btn.disabled = true; btn.textContent = '⏳ Đang gửi...';
    statusEl.textContent = 'Đang kết nối Google Apps Script...';
    statusEl.className = 'status-msg ok';
    try {
        const json = await gasGet({ action: 'update', data: JSON.stringify(row) });
        if (json.status === 'ok') {
            statusEl.textContent = '✅ Đã đồng bộ lên Google Sheet thành công!';
            statusEl.className = 'status-msg ok';
            showToast('Đồng bộ thành công!');
            applyRowLocally(row);
            setTimeout(() => closeEditModal(), 2000);
        } else {
            throw new Error(json.message || 'Lỗi không xác định');
        }
    } catch(e) {
        statusEl.textContent = '❌ Lỗi: ' + e.message;
        statusEl.className = 'status-msg err';
        showToast('Lỗi kết nối Apps Script');
    } finally {
        btn.disabled = false; btn.textContent = '📡 Lưu & Đồng bộ';
    }
}

// ── IMAGE HANDLING ──
function handleEditImageFile(event) {
    const file = event.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => resizeImage(e.target.result, (resized, err) => {
        if (resized) {
            editImageDataUrl = resized;
            editImagePath = `images/${file.name}`;
            document.getElementById('fImagePreview').innerHTML = `<img src="${resized}" alt="">`;
            showToast('Ảnh sẵn sàng');
        } else {
            showToast(err || 'Lỗi ảnh');
        }
    });
    reader.readAsDataURL(file);
}

function resizeImage(dataUrl, callback) {
    const img = new Image();
    img.onload = () => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        let w = img.width, h = img.height;
        const scale = Math.min(1, 400 / Math.max(w, h));
        w = Math.round(w * scale); h = Math.round(h * scale);
        canvas.width = w; canvas.height = h;
        ctx.drawImage(img, 0, 0, w, h);
        callback(canvas.toDataURL('image/jpeg', 0.85));
    };
    img.onerror = () => callback('', 'Không đọc được ảnh');
    img.src = dataUrl;
}

// ── ADD MARKER MODE ──
function startAddMarker() {
    if (addMarkerMode) {
        addMarkerMode = false; pendingNewMarker = false; updateAddBtn();
        showToast('Đã tắt chế độ thêm'); return;
    }
    addMarkerMode = true; pendingNewMarker = true; updateAddBtn();
    showToast('Nhấp vào bản đồ để chọn vị trí');
}

function updateAddBtn() {
    const btn = document.getElementById('addMarkerBtn');
    const icon = document.getElementById('addMarkerIcon');
    const lbl = document.getElementById('addMarkerLabel');
    if (!btn) return;
    if (addMarkerMode) {
        btn.style.color = 'var(--red)';
        if (icon) icon.textContent = '🛑';
        if (lbl) lbl.textContent = 'Dừng';
    } else {
        btn.style.color = '';
        if (icon) icon.textContent = '➕';
        if (lbl) lbl.textContent = 'Thêm';
    }
}

// ── TEST GAS CONNECTION ──
async function testGASConnection() {
    const btn = document.getElementById('testGasBtn');
    const result = document.getElementById('gasTestResult');
    btn.disabled = true;
    btn.textContent = '⏳ Đang kiểm tra...';
    result.style.display = 'block';
    result.style.background = '#f1f5f9';
    result.style.color = '#64748b';
    result.textContent = 'Đang gửi GET request tới Apps Script...';
    try {
        const start = Date.now();
        const res = await fetch(GAS_URL, { method: 'GET' });
        const elapsed = Date.now() - start;
        if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);
        const text = await res.text();
        let parsed;
        try { parsed = JSON.parse(text); } catch(e) { parsed = { raw: text }; }
        result.style.background = '#ecfdf5';
        result.style.color = '#065f46';
        result.innerHTML = `✅ <b>Kết nối thành công</b> (${elapsed}ms)<br>` +
            `URL: <span style="opacity:0.7">${GAS_URL.slice(0,60)}…</span><br>` +
            `Phản hồi: ${JSON.stringify(parsed)}`;
        showToast(`✅ Apps Script hoạt động (${elapsed}ms)`);
    } catch(e) {
        result.style.background = '#fef2f2';
        result.style.color = '#991b1b';
        result.innerHTML = `❌ <b>Kết nối thất bại</b><br>` +
            `Lỗi: ${e.message}<br><br>` +
            `<b>Kiểm tra:</b><br>` +
            `• Script đã deploy với quyền <i>Anyone</i>?<br>` +
            `• URL dùng <code>/exec</code> (không phải <code>/dev</code>)?<br>` +
            `• Hàm <code>doGet</code> có trong script?`;
        showToast('❌ Không kết nối được Apps Script');
    } finally {
        btn.disabled = false;
        btn.textContent = '🔌 Kiểm tra kết nối Apps Script';
    }
}

// ── UPDATE LOCATION MODAL ──
function openUpdateModal() {
    uPendingLat = null; uPendingLon = null;
    document.getElementById('uCoordsDisplay').textContent = 'Chưa có — nhấn nút bên dưới';
    document.getElementById('uName').value = '';
    document.getElementById('updateStatus').className = 'status-msg';
    document.getElementById('updateModal').classList.add('open');
    document.getElementById('uName').focus();
}

function openUpdateModalForMe(name) {
    openUpdateModal();
    document.getElementById('uName').value = name;
}

function getGPSForUpdate() {
    if (!navigator.geolocation) { showToast('Trình duyệt không hỗ trợ GPS'); return; }
    document.getElementById('uCoordsDisplay').textContent = '⏳ Đang lấy vị trí...';
    navigator.geolocation.getCurrentPosition(p => {
        uPendingLat = p.coords.latitude;
        uPendingLon = p.coords.longitude;
        document.getElementById('uCoordsDisplay').textContent = `${uPendingLat.toFixed(6)}, ${uPendingLon.toFixed(6)}`;
    }, e => {
        document.getElementById('uCoordsDisplay').textContent = 'Lỗi: ' + e.message;
    }, { enableHighAccuracy: true, timeout: 15000 });
}

async function submitLocationUpdate() {
    const name = document.getElementById('uName').value.trim();
    if (!name) { showToast('Vui lòng nhập tên'); return; }
    if (!isFinite(uPendingLat)) { showToast('Vui lòng lấy vị trí GPS trước'); return; }
    const gasUrl = GAS_URL;
    const btn = document.getElementById('uSubmitBtn');
    const statusEl = document.getElementById('updateStatus');
    btn.disabled = true; btn.textContent = '⏳ Đang gửi...';
    statusEl.textContent = 'Đang kết nối...';
    statusEl.className = 'status-msg ok';
    try {
        const json = await gasGet({ action: 'updateCoords', name, lat: uPendingLat, lon: uPendingLon });
        if (json.status === 'ok') {
            statusEl.textContent = `✅ Đã cập nhật vị trí của "${name}" thành công!`;
            statusEl.className = 'status-msg ok';
            showToast('Cập nhật thành công!');
            // Apply locally
            const norm = normalizeText(name);
            for (let i = 0; i < loadedData.length; i++) {
                const p = parseRow(loadedData[i]);
                if (normalizeText(p.name) === norm || p.id === name) {
                    loadedData[i]['latitude'] = uPendingLat;
                    loadedData[i]['longtitude'] = uPendingLon;
                    const entry = markers[i];
                    if (entry) {
                        entry.lat = uPendingLat; entry.lon = uPendingLon;
                        markersCluster.removeLayer(entry.marker);
                        entry.marker.setLatLng([uPendingLat, uPendingLon]);
                        entry.marker.setPopupContent(buildPopupHTML(loadedData[i], i));
                        markersCluster.addLayer(entry.marker);
                        if (entry.labelMarker) entry.labelMarker.setLatLng([uPendingLat, uPendingLon]);
                        map.setView([uPendingLat, uPendingLon], 17);
                    }
                    break;
                }
            }
            setTimeout(() => document.getElementById('updateModal').classList.remove('open'), 2500);
        } else {
            throw new Error(json.message || 'Lỗi không xác định');
        }
    } catch(e) {
        statusEl.textContent = '❌ Lỗi: ' + e.message;
        statusEl.className = 'status-msg err';
    } finally {
        btn.disabled = false; btn.textContent = '📡 Cập nhật';
    }
}

// ── LOCATION ──
function centerOnUserLocation() {
    if (!navigator.geolocation) { showToast('Trình duyệt không hỗ trợ GPS'); return; }
    navigator.geolocation.getCurrentPosition(p => {
        map.setView([p.coords.latitude, p.coords.longitude], 17);
        showToast('Đã định vị vị trí của bạn');
    }, e => showToast('Không lấy được GPS: ' + e.message));
}
